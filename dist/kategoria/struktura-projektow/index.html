</style></head> <body> <header> <a href="../../index.html" class="header-tag header-home">← Strona główna</a> <h1>Struktura Projektow</h1> <div class="subtitle">Materiały do nauki w tej kategorii</div> </header> <main> <div class="category-section" data-astro-cid-stsmp6mm> <h2 class="section-title" data-astro-cid-stsmp6mm>📖 Notatki i Mapy Myśli</h2> <div class="tiles-grid sub-tiles" data-astro-cid-stsmp6mm> <a href="../../notatki/struktura-projektow-analiza_imprv/index.html" class="tile-link" data-astro-cid-stsmp6mm> <h2 data-astro-cid-stsmp6mm>Analiza struktury projektu imprv-masterclass-testing w odniesieniu do Cosmic Python</h2> <p class="tile-subtitle" data-astro-cid-stsmp6mm> 📄 Dokument MD </p> </a><a href="../../notatki/struktura-projektow-notatki/index.html" class="tile-link" data-astro-cid-stsmp6mm> <h2 data-astro-cid-stsmp6mm>Notatki: Struktura projektów – architektura wspierająca model domeny</h2> <p class="tile-subtitle" data-astro-cid-stsmp6mm> 📄 Dokument MD </p> </a> </div> </div> </main> <script type="module">
      import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
      mermaid.initialize({ 
        startOnLoad: true, 
        theme: 'dark',
        fontFamily: 'Syne, sans-serif'
      });
      
      // Astro renderuje kod mermaid jako zwykłe bloki <pre class="language-mermaid"><code>...
      // Musimy je znaleźć i przekształcić na divy z klasą mermaid, żeby skrypt je wyrenderował
      document.addEventListener('DOMContentLoaded', () => {
        const mermaidBlocks = document.querySelectorAll('pre.astro-code.mermaid, pre.language-mermaid');
        
        mermaidBlocks.forEach(block => {
          const code = block.textContent;
          const div = document.createElement('div');
          div.className = 'mermaid';
          div.textContent = code;
          block.parentNode.replaceChild(div, block);
        });
        
        mermaid.init(undefined, document.querySelectorAll('.mermaid'));
      });
    </script> </body> </html>
