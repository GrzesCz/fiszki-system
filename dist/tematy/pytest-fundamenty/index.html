</a> </div> <div id="progressWrap" class="progress-wrap"> <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div> <div class="progress-label" id="progressLabel">1 / 34</div> </div> <div class="card-wrap" id="cardWrap" data-cards="[{&#34;cat&#34;:&#34;kod&#34;,&#34;catLabel&#34;:&#34;💻 Kod&#34;,&#34;q&#34;:&#34;Jak zainstalować pytest?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;><code>pip install pytest</code></pre>&#34;},{&#34;cat&#34;:&#34;pojecie&#34;,&#34;catLabel&#34;:&#34;💡 Pojęcie&#34;,&#34;q&#34;:&#34;W jakim domyślnym katalogu pytest szuka testów?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>W katalogu <b>tests/</b> (lub test/).</pre>&#34;},{&#34;cat&#34;:&#34;kod&#34;,&#34;catLabel&#34;:&#34;💻 Kod&#34;,&#34;q&#34;:&#34;Jaką konwencję nazewnictwa muszą mieć pliki testowe, żeby pytest je znalazł?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;><code>test_*.py</code> (np. <code>test_service.py</code>). Plik bez prefiksu <code>test_</code> zostanie zignorowany przez pytest.</pre>&#34;},{&#34;cat&#34;:&#34;kod&#34;,&#34;catLabel&#34;:&#34;💻 Kod&#34;,&#34;q&#34;:&#34;Jaką konwencję nazewnictwa muszą mieć funkcje testowe?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>Muszą zaczynać się od <code>test_</code> (np. <code>def test_create_resume():</code>). Bez tego prefiksu pytest nie uzna funkcji za test.</pre>&#34;},{&#34;cat&#34;:&#34;kod&#34;,&#34;catLabel&#34;:&#34;💻 Kod&#34;,&#34;q&#34;:&#34;Do czego w teście służy słowo kluczowe assert?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>Do weryfikacji, czy warunek jest <b>prawdziwy</b>. Jeśli jest fałszywy, test nie przechodzi (FAILED).</pre>&#34;},{&#34;cat&#34;:&#34;pojecie&#34;,&#34;catLabel&#34;:&#34;💡 Pojęcie&#34;,&#34;q&#34;:&#34;Co oznacza PASSED (zielony) i FAILED (czerwony) w raporcie pytest?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;><b>PASSED</b> (zielony) = wszystkie asercje w teście były prawdziwe.\n<b>FAILED</b> (czerwony) = przynajmniej jedna asercja się nie spełniła.</pre>&#34;},{&#34;cat&#34;:&#34;kod&#34;,&#34;catLabel&#34;:&#34;💻 Kod&#34;,&#34;q&#34;:&#34;Jaką flagę dodać do polecenia pytest, aby zobaczyć szczegółowy raport z nazwami testów?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>Flagę <b>-v</b> (verbose), np. <code>pytest -v</code>.</pre>&#34;},{&#34;cat&#34;:&#34;kod&#34;,&#34;catLabel&#34;:&#34;💻 Kod&#34;,&#34;q&#34;:&#34;Jak uruchomić tylko jeden konkretny plik testowy?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;><code>pytest tests/unit/test_service.py</code> — podajesz ścieżkę do pliku jako argument.</pre>&#34;},{&#34;cat&#34;:&#34;kod&#34;,&#34;catLabel&#34;:&#34;💻 Kod&#34;,&#34;q&#34;:&#34;Jak uruchomić tylko testy, w których nazwie jest słowo \&#34;create_resume\&#34;?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;><code>pytest -k \&#34;create_resume\&#34;</code> — flaga <code>-k</code> filtruje testy po nazwie.</pre>&#34;},{&#34;cat&#34;:&#34;pojecie&#34;,&#34;catLabel&#34;:&#34;💡 Pojęcie&#34;,&#34;q&#34;:&#34;Czym jest test jednostkowy (unit test)?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>Test <b>jednego komponentu w izolacji</b> od reszty aplikacji. Używa <b>mocków (atrap)</b> zamiast prawdziwej bazy, API czy sieci. Działa w <b>milisekundach</b>.</pre>&#34;},{&#34;cat&#34;:&#34;pojecie&#34;,&#34;catLabel&#34;:&#34;💡 Pojęcie&#34;,&#34;q&#34;:&#34;Czym jest test integracyjny?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>Test <b>współpracy między modułami</b> — np. czy repozytorium faktycznie zapisuje dane do prawdziwej bazy. Używa <b>TestClient</b> (w pamięci, bez serwera HTTP). Wolniejszy niż unit (sekundy).</pre>&#34;},{&#34;cat&#34;:&#34;pojecie&#34;,&#34;catLabel&#34;:&#34;💡 Pojęcie&#34;,&#34;q&#34;:&#34;Czym jest test E2E (End-to-End)?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>Test <b>całego przepływu od początku do końca</b> — uruchamia <b>prawdziwy serwer</b> (np. FastAPI na porcie 8000) i wysyła <b>prawdziwe requesty HTTP</b>. Najwolniejszy i najdroższy typ testu.</pre>&#34;},{&#34;cat&#34;:&#34;pojecie&#34;,&#34;catLabel&#34;:&#34;💡 Pojęcie&#34;,&#34;q&#34;:&#34;Jakie testy są na samym dole Piramidy Testów (jest ich najwięcej)?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;><b>Testy jednostkowe (Unit)</b>.</pre>&#34;},{&#34;cat&#34;:&#34;pojecie&#34;,&#34;catLabel&#34;:&#34;💡 Pojęcie&#34;,&#34;q&#34;:&#34;Dlaczego E2E jest na górze piramidy testów (jest ich najmniej)?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>Bo są <b>wolne</b> (uruchamiają cały stos) i <b>drogie</b> (wymagają prawdziwego serwera, bazy, sieci). Nie zawsze jest to potrzebne — wystarczy ich niewiele, żeby sprawdzić kluczowe przepływy.</pre>&#34;},{&#34;cat&#34;:&#34;pojecie&#34;,&#34;catLabel&#34;:&#34;💡 Pojęcie&#34;,&#34;q&#34;:&#34;Czym test E2E (End-to-End) różni się od testu integracyjnego w kontekście serwera HTTP?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>E2E uruchamia <b>prawdziwy serwer</b> (np. na porcie 8000), a integracyjny używa <b>atrapy serwera w pamięci</b> (np. TestClient).</pre>&#34;},{&#34;cat&#34;:&#34;pojecie&#34;,&#34;catLabel&#34;:&#34;💡 Pojęcie&#34;,&#34;q&#34;:&#34;Co warto testować, a czego NIE testować?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;><b>Testuj:</b> logikę biznesową, edge cases (pusta lista, ujemna liczba), obsługę błędów, naprawione bugi (testy regresyjne).\n<b>NIE testuj:</b> getterów/setterów, kodu frameworków (FastAPI, pytest), bibliotek zewnętrznych.</pre>&#34;},{&#34;cat&#34;:&#34;pojecie&#34;,&#34;catLabel&#34;:&#34;💡 Pojęcie&#34;,&#34;q&#34;:&#34;Co to jest test regresyjny?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>Test napisany <b>po naprawieniu buga</b>, żeby upewnić się, że ten sam bug nigdy nie wróci. Naprawiłeś błąd? Napisz test, który by go złapał.</pre>&#34;},{&#34;cat&#34;:&#34;pojecie&#34;,&#34;catLabel&#34;:&#34;💡 Pojęcie&#34;,&#34;q&#34;:&#34;Co to jest klasa abstrakcyjna (ABC) w Pythonie?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;><b>Kontrakt</b> (umowa) — lista metod, które klasa dziedzicząca <b>MUSI</b> zaimplementować. Sama klasa abstrakcyjna nie może być instancjonowana (nie da się z niej stworzyć obiektu). Pochodzi z wbudowanego modułu <code>abc</code>.</pre>&#34;},{&#34;cat&#34;:&#34;kod&#34;,&#34;catLabel&#34;:&#34;💻 Kod&#34;,&#34;q&#34;:&#34;Jak zaimportować ABC w Pythonie?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;><code>from abc import ABC, abstractmethod</code>\nModuł <code>abc</code> jest <b>wbudowany w Pythona</b> — nie wymaga <code>pip install</code>.</pre>&#34;},{&#34;cat&#34;:&#34;pojecie&#34;,&#34;catLabel&#34;:&#34;💡 Pojęcie&#34;,&#34;q&#34;:&#34;Czy można stworzyć obiekt (instancję) z klasy abstrakcyjnej?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;><b>Nie.</b> Klasa abstrakcyjna to tylko kontrakt (kartka z wymaganiami). Próba <code>obj = AbstractNotifier()</code> rzuci błędem <code>TypeError</code>. Musisz najpierw stworzyć klasę, która dziedziczy po ABC i implementuje wszystkie metody z <code>@abstractmethod</code>.</pre>&#34;},{&#34;cat&#34;:&#34;pojecie&#34;,&#34;catLabel&#34;:&#34;💡 Pojęcie&#34;,&#34;q&#34;:&#34;Co się stanie, jeśli klasa dziedzicząca po ABC nie zaimplementuje metody oznaczonej @abstractmethod?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>Python rzuci <b>błąd natychmiast</b> (<code>TypeError</code>) przy próbie stworzenia obiektu takiej klasy. Nie musisz czekać na produkcję — dowiesz się od razu.</pre>&#34;},{&#34;cat&#34;:&#34;kod&#34;,&#34;catLabel&#34;:&#34;💻 Kod&#34;,&#34;q&#34;:&#34;Jakiego dekoratora musisz użyć, aby wymusić na klasie dziedziczącej po ABC stworzenie konkretnej metody?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;><code>@abstractmethod</code></pre>&#34;},{&#34;cat&#34;:&#34;pojecie&#34;,&#34;catLabel&#34;:&#34;💡 Pojęcie&#34;,&#34;q&#34;:&#34;Jaka jest główna korzyść z wstrzykiwania do klasy kontraktu (ABC) zamiast konkretnej implementacji (np. EmailSender)?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>Pozwala to na <b>łatwą wymianę logiki</b> (np. na SmsSender) bez konieczności zmieniania kodu głównej klasy. Klocki LEGO zamiast przyspawania.</pre>&#34;},{&#34;cat&#34;:&#34;pojecie&#34;,&#34;catLabel&#34;:&#34;💡 Pojęcie&#34;,&#34;q&#34;:&#34;Kiedy warto stosować ABC (klasę abstrakcyjną) w kodzie?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>Gdy <b>sposób realizacji może się zmieniać</b>, ale <b>cel pozostaje ten sam</b>.\nPrzykłady:\n• Powiadomienia: cel = „powiadom klienta”, sposób = Email / SMS / Push\n• Baza danych: cel = „zapisz CV”, sposób = PostgreSQL / MongoDB / SQLite</pre>&#34;},{&#34;cat&#34;:&#34;pojecie&#34;,&#34;catLabel&#34;:&#34;💡 Pojęcie&#34;,&#34;q&#34;:&#34;Co to jest mock (atrapa) w testach?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;><b>Fałszywy obiekt</b>, który udaje prawdziwy (np. bazę danych, API, storage). Dane w nim nie są pobierane z prawdziwych źródeł. Używany w testach jednostkowych, żeby testować <b>tylko logikę kodu</b>, bez bazy, sieci i zewnętrznych serwisów.</pre>&#34;},{&#34;cat&#34;:&#34;pojecie&#34;,&#34;catLabel&#34;:&#34;💡 Pojęcie&#34;,&#34;q&#34;:&#34;Dlaczego używamy mocków w testach jednostkowych? (podaj 4 powody)&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>1. <b>Izolacja</b> — testujesz tylko logikę, nie bazę ani sieć.\n2. <b>Szybkość</b> — milisekundy zamiast sekund (brak połączenia z bazą).\n3. <b>Taniość</b> — brak kosztów API, bazy, storage.\n4. <b>Niezawodność</b> — test działa offline, nie pada przez awarię sieci.</pre>&#34;},{&#34;cat&#34;:&#34;kod&#34;,&#34;catLabel&#34;:&#34;💻 Kod&#34;,&#34;q&#34;:&#34;Skąd wziąć mocki w Pythonie? Podaj dwie opcje.&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>1. <code>unittest.mock</code> — <b>wbudowane w Pythona</b> (bez pip install).\n2. <code>pytest-mock</code> — <b>plugin</b> (<code>pip install pytest-mock</code>), daje fixture <code>mocker</code> i automatycznie sprząta po teście.</pre>&#34;},{&#34;cat&#34;:&#34;pojecie&#34;,&#34;catLabel&#34;:&#34;💡 Pojęcie&#34;,&#34;q&#34;:&#34;Co daje plugin pytest-mock? Czym różni się od wbudowanego unittest.mock?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>Daje fixture <code>mocker</code>, który:\n• Nie wymaga importu — wpisujesz go jako parametr testu i pytest sam go wstrzykuje.\n• <b>Automatycznie sprząta</b> po teście (cofanie patch'ów).\nPrzy <code>unittest.mock</code> musiałbyś sam wywoływać <code>patch.stop()</code>.</pre>&#34;},{&#34;cat&#34;:&#34;kod&#34;,&#34;catLabel&#34;:&#34;💻 Kod&#34;,&#34;q&#34;:&#34;Jaki jest pełny schemat tworzenia i używania mocka z pytest-mock?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;><code>mock = mocker.Mock(spec=AbstractResumesRepository)</code>  ← tworzy atrapę\n<code>mock.create_resume.return_value = fake_resume</code>       ← programuje odpowiedź\n<code>mock.create_resume.assert_called_once()</code>             ← sprawdza użycie</pre>&#34;},{&#34;cat&#34;:&#34;kod&#34;,&#34;catLabel&#34;:&#34;💻 Kod&#34;,&#34;q&#34;:&#34;Jakiej metody mocka użyjesz, aby zamiast prawdziwej funkcji zwrócił on podaną przez Ciebie wartość?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;><code>.return_value</code>\nPrzykład: <code>mock.daj_marchewke.return_value = \&#34;drewniana_marchewka\&#34;</code>\nPrawdziwa funkcja się <b>nie wykonuje</b> — mock łapie wywołanie i od razu zwraca podaną wartość.</pre>&#34;},{&#34;cat&#34;:&#34;pojecie&#34;,&#34;catLabel&#34;:&#34;💡 Pojęcie&#34;,&#34;q&#34;:&#34;Do czego służy metoda mocka .side_effect?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>Do symulowania <b>wybuchu błędu (wyjątku)</b>, zamiast zwracania wartości.\nPrzykład: <code>mock.upload.side_effect = Exception(\&#34;S3 timeout\&#34;)</code>\nSłuży do testowania: „co się stanie, jak coś pójdzie nie tak?”</pre>&#34;},{&#34;cat&#34;:&#34;kod&#34;,&#34;catLabel&#34;:&#34;💻 Kod&#34;,&#34;q&#34;:&#34;Do czego służy metoda mocka .assert_called_once()?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>Sprawdza, czy mock został wywołany <b>dokładnie raz</b>.\n• Wywołany 1 raz → test idzie dalej (OK).\n• Wywołany 0 razy lub 2+ razy → <code>AssertionError</code> (test FAILED).\nNie zwraca True/False — to asercja, jak <code>assert</code>.</pre>&#34;},{&#34;cat&#34;:&#34;kod&#34;,&#34;catLabel&#34;:&#34;💻 Kod&#34;,&#34;q&#34;:&#34;Do czego służy metoda mocka .assert_called_with(arg1, arg2)?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>Sprawdza, czy mock został wywołany z <b>dokładnie tymi argumentami</b>.\nPrzykład: <code>mock.create_resume.assert_called_with(user_id=456, resume=patch)</code>\nJeśli argumenty się nie zgadzają → <code>AssertionError</code> (test FAILED).</pre>&#34;},{&#34;cat&#34;:&#34;pojecie&#34;,&#34;catLabel&#34;:&#34;💡 Pojęcie&#34;,&#34;q&#34;:&#34;Dlaczego używanie samego mocker.Mock() bez atrybutu spec= jest niebezpieczne?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>Ponieważ taki mock pozwala wywołać <b>dowolną, nieistniejącą metodę</b> (np. przez literówkę <code>mock.create_resum()</code>), dając fałszywie \&#34;zielony\&#34; test. Z <code>spec=AbstractClass</code> mock zna tylko metody z kontraktu — literówka rzuca <code>AttributeError</code> natychmiast.</pre>&#34;}]"> <div class="card" id="card"> <div class="card-face card-front" id="cardFront"> <div class="category" id="cardCategory"></div> <div class="card-label">PYTANIE</div> <div class="card-question" id="cardQuestion"></div> <div class="card-hint pulse">↩ kliknij aby odkryć odpowiedź</div> </div> <div class="card-face card-back" id="cardBack"> <div class="category" id="cardCategoryBack"></div> <div class="card-label">ODPOWIEDŹ</div> <div class="answer-sep"></div> <div class="card-answer" id="cardAnswer"></div> <div class="card-next-hint" id="cardNextHint">↓ Przewiń w razie potrzeby · Przyciski na dole ekranu</div> </div> </div> </div> <div class="controls-wrap" id="controlsWrap"> <div class="btn-row" id="btnRow" style="display:none"> <button type="button" class="btn btn-bad" data-rate="bad">✗ Nie wiedziałem</button> <button type="button" class="btn btn-ok" data-rate="ok">~ Prawie</button> <button type="button" class="btn btn-good" data-rate="good">✓ Wiedziałem</button> </div> <div class="btn-nav" id="btnNav"> <button type="button" class="btn-secondary" id="btnPrev">← Poprzednia</button> <button type="button" class="btn-secondary" id="btnShuffle">⇄ Tasuj</button> <button type="button" class="btn-secondary" id="btnNext">Następna →</button> </div> </div> <div class="stats"> <div class="stat-box"> <div class="stat-num" id="statGood" style="color:var(--green)">0</div> <div class="stat-label">Wiedziałem</div> </div> <div class="stat-box"> <div class="stat-num" id="statOk" style="color:var(--yellow)">0</div> <div class="stat-label">Prawie</div> </div> <div class="stat-box"> <div class="stat-num" id="statBad" style="color:var(--red)">0</div> <div class="stat-label">Nie wiedziałem</div> </div> </div> <div class="finish-screen" id="finishScreen"> <div class="finish-emoji">🎯</div> <div class="finish-title">Sesja zakończona!</div> <div class="finish-stats" id="finishStats"></div> <button type="button" class="btn-secondary" id="btnRestartAll" style="margin-top:1rem">↺ Zacznij od nowa</button> <button type="button" class="btn-secondary" id="btnRestartBad">↺ Powtórz błędne</button> </div> <script>
    const cardWrap = document.getElementById('cardWrap');
    const cards = JSON.parse(cardWrap?.dataset.cards || '[]');
    let currentCards = [...cards];
    let currentIndex = 0;
    let isFlipped = false;
    let scores = { good: 0, ok: 0, bad: 0 };
    let rated = new Set();
    let ratedScores = {};

    const catClass = (cat) => ({ pojecie: 'cat-pojecie', kod: 'cat-kod', analogia: 'cat-analogia', naming: 'cat-naming' }[cat] || 'cat-pojecie');

    function render() {
      const card = currentCards[currentIndex];
      if (!card) return;
      const catCls = catClass(card.cat);
      document.getElementById('cardCategory').className = `category ${catCls}`;
      document.getElementById('cardCategory').textContent = card.catLabel;
      document.getElementById('cardCategoryBack').className = `category ${catCls}`;
      document.getElementById('cardCategoryBack').textContent = card.catLabel;
      document.getElementById('cardQuestion').textContent = card.q;
      document.getElementById('cardAnswer').innerHTML = card.a;
      document.getElementById('progressLabel').textContent = `${currentIndex + 1} / ${currentCards.length}`;
      document.getElementById('progressFill').style.width = `${((currentIndex + 1) / currentCards.length) * 100}%`;
      isFlipped = false;
      document.getElementById('card').classList.remove('flipped');
      document.getElementById('btnRow').style.display = 'none';
      document.getElementById('statGood').textContent = scores.good;
      document.getElementById('statOk').textContent = scores.ok;
      document.getElementById('statBad').textContent = scores.bad;
    }

    function flipCard() {
      if (isFlipped) return;
      isFlipped = true;
      document.getElementById('card').classList.add('flipped');
      document.getElementById('btnRow').style.display = 'grid';
    }

    function rate(score) {
      const cardIndex = cards.indexOf(currentCards[currentIndex]);
      if (!rated.has(currentIndex)) {
        scores[score]++;
        rated.add(currentIndex);
        ratedScores[cardIndex] = score;
      }
      nextCard();
    }

    function nextCard() {
      if (currentIndex < currentCards.length - 1) {
        currentIndex++;
        render();
      } else {
        showFinish();
      }
    }

    function prevCard() {
      if (currentIndex > 0) {
        currentIndex--;
        render();
      }
    }

    function shuffleCards() {
      for (let i = currentCards.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [currentCards[i], currentCards[j]] = [currentCards[j], currentCards[i]];
      }
      currentIndex = 0;
      rated.clear();
      render();
    }

    function showFinish() {
      document.getElementById('cardWrap').classList.add('hidden');
      document.getElementById('controlsWrap').classList.add('hidden');
      document.getElementById('progressWrap').classList.add('hidden');
      document.querySelector('.stats').classList.add('hidden');
      const pct = Math.round((scores.good / currentCards.length) * 100);
      document.getElementById('finishStats').innerHTML = `
        <div class="stat-box"><div class="stat-num" style="color:var(--green)">${scores.good}</div><div class="stat-label">Wiedziałem</div></div>
        <div class="stat-box"><div class="stat-num" style="color:var(--yellow)">${scores.ok}</div><div class="stat-label">Prawie</div></div>
        <div class="stat-box"><div class="stat-num" style="color:var(--red)">${scores.bad}</div><div class="stat-label">Nie wiedziałem</div></div>
        <div class="stat-box"><div class="stat-num" style="color:var(--accent)">${pct}%</div><div class="stat-label">Wynik</div></div>
      `;
      document.getElementById('finishScreen').classList.add('visible');
      if (scores.bad === 0) document.getElementById('btnRestartBad').style.display = 'none';
    }

    function restartAll() {
      currentCards = [...cards];
      currentIndex = 0;
      scores = { good: 0, ok: 0, bad: 0 };
      rated.clear();
      ratedScores = {};
      document.getElementById('cardWrap').classList.remove('hidden');
      document.getElementById('controlsWrap').classList.remove('hidden');
      document.getElementById('progressWrap').classList.remove('hidden');
      document.querySelector('.stats').classList.remove('hidden');
      document.getElementById('finishScreen').classList.remove('visible');
      document.getElementById('btnRestartBad').style.display = '';
      render();
    }

    function restartBad() {
      const badIndices = Object.keys(ratedScores).filter(k => ratedScores[k] === 'bad').map(Number);
      if (badIndices.length === 0) return;
      currentCards = badIndices.map(i => cards[i]);
      currentIndex = 0;
      scores = { good: 0, ok: 0, bad: 0 };
      rated.clear();
      document.getElementById('cardWrap').classList.remove('hidden');
      document.getElementById('controlsWrap').classList.remove('hidden');
      document.getElementById('progressWrap').classList.remove('hidden');
      document.querySelector('.stats').classList.remove('hidden');
      document.getElementById('finishScreen').classList.remove('visible');
      document.getElementById('btnRestartBad').style.display = badIndices.length > 0 ? '' : 'none';
      render();
    }

    cardWrap?.addEventListener('click', flipCard);
    document.querySelectorAll('[data-rate]').forEach(btn => btn.addEventListener('click', () => rate(btn.dataset.rate)));
    document.getElementById('btnPrev')?.addEventListener('click', prevCard);
    document.getElementById('btnNext')?.addEventListener('click', nextCard);
    document.getElementById('btnShuffle')?.addEventListener('click', shuffleCards);
    document.getElementById('btnRestartAll')?.addEventListener('click', restartAll);
    document.getElementById('btnRestartBad')?.addEventListener('click', restartBad);

    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space') { e.preventDefault(); flipCard(); }
      if (e.code === 'ArrowRight') nextCard();
      if (e.code === 'ArrowLeft') prevCard();
      if (e.code === 'Digit1') rate('bad');
      if (e.code === 'Digit2') rate('ok');
      if (e.code === 'Digit3') rate('good');
    });

    render();
  </script>  </main> <script type="module">
      import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
      mermaid.initialize({

        fontFamily: 'Syne, sans-serif'

      // Astro renderuje kod mermaid jako zwykłe bloki <pre class="language-mermaid"><code>...
      // Musimy je znaleźć i przekształcić na divy z klasą mermaid, żeby skrypt je wyrenderował
      document.addEventListener('DOMContentLoaded', () => {
        const mermaidBlocks = document.querySelectorAll('pre.astro-code.mermaid, pre.language-mermaid');
        
        mermaidBlocks.forEach(block => {
          const code = block.textContent;
          const div = document.createElement('div');
          div.className = 'mermaid';
          div.textContent = code;
          block.parentNode.replaceChild(div, block);
        });
        
        mermaid.init(undefined, document.querySelectorAll('.mermaid'));
      });
