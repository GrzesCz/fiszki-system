← Wróć do kategorii
</a> </div> <div id="progressWrap" class="progress-wrap"> <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div> <div class="progress-label" id="progressLabel">1 / 14</div> </div> <div class="card-wrap" id="cardWrap" data-cards="[{&#34;cat&#34;:&#34;pojecie&#34;,&#34;catLabel&#34;:&#34;💡 Pojęcie&#34;,&#34;q&#34;:&#34;Czym jest fixture w pytest?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>To funkcja działająca jak <b>pomocnik testu</b>. Przygotowuje dane, obiekty lub środowisko (setup) i może je po sobie posprzątać (teardown).\n\n<b>Po co to nam? (Zasada DRY)</b>\nZamiast w każdym z 10 testów pisać od nowa kod tworzący użytkownika czy konfigurację, piszesz to <b>raz</b> w fixture. Pytest sam wie, kiedy to uruchomić i \&#34;wstrzykuje\&#34; gotowy obiekt bezpośrednio do testu, który o to poprosi.</pre>&#34;},{&#34;cat&#34;:&#34;kod&#34;,&#34;catLabel&#34;:&#34;💻 Kod&#34;,&#34;q&#34;:&#34;Jakiego dekoratora użyjesz, żeby zmienić zwykłą funkcję w fixture?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;><code>@pytest.fixture</code></pre>&#34;},{&#34;cat&#34;:&#34;pojecie&#34;,&#34;catLabel&#34;:&#34;💡 Pojęcie&#34;,&#34;q&#34;:&#34;Czym różni się return od yield w fixture?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;><b>return</b> tylko zwraca dane (nie pozwala na sprzątanie).\n<b>yield</b> zatrzymuje (pauzuje) fixture na czas wykonywania testu, a kod umieszczony po <code>yield</code> wykonuje się po zakończeniu testu (sprzątanie/teardown).\n\n<b>Analogia (Wypożyczalnia aut):</b>\n• <b>return</b> – dostajesz kluczyki i koniec. Wypożyczalnia nie interesuje się, co zrobisz z autem po jeździe.\n• <b>yield</b> – dostajesz kluczyki (setup przed <code>yield</code>), idziesz pojeździć (wykonuje się test), a gdy wracasz, pracownik od razu myje auto i chowa do garażu (kod po <code>yield</code>). Co ważne, sprzątanie wykona się <b>zawsze</b>, nawet jeśli test \&#34;wybuchnie\&#34;!</pre>&#34;},{&#34;cat&#34;:&#34;kod&#34;,&#34;catLabel&#34;:&#34;💻 Kod&#34;,&#34;q&#34;:&#34;Jak wstrzyknąć fixture do funkcji testowej?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>Podając jego <b>nazwę jako argument</b> funkcji testowej, np. <code>def test_login(moja_baza):</code>\n\nNazywa się to <b>Dependency Injection</b> (Wstrzykiwanie Zależności). Nie musisz ręcznie wywoływać <code>moja_baza()</code>. Pytest to sprytny menedżer – widzi, że test prosi o <code>moja_baza</code>, sam odpala tę funkcję w tle i podstawia gotowy wynik pod ten argument.</pre>&#34;},{&#34;cat&#34;:&#34;pojecie&#34;,&#34;catLabel&#34;:&#34;💡 Pojęcie&#34;,&#34;q&#34;:&#34;Jakie są 4 główne typy zasięgu (scope) w fixtures?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>1. <b>function</b> (domyślny) - odpala się przed każdym testem od nowa (idealne do mocków).\n2. <b>class</b> - raz na całą klasę testową.\n3. <b>module</b> - raz na cały plik testowy.\n4. <b>session</b> - raz na całe uruchomienie pytest (idealne dla bardzo drogich operacji, np. uruchomienie serwera lub nawiązanie głównego połączenia z bazą).</pre>&#34;},{&#34;cat&#34;:&#34;pojecie&#34;,&#34;catLabel&#34;:&#34;💡 Pojęcie&#34;,&#34;q&#34;:&#34;Który scope wybrać dla stworzenia głównego połączenia z bazą danych w całym projekcie?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;><code>scope=\&#34;session\&#34;</code>, aby połączenie nawiązało się tylko raz i było współdzielone przez wszystkie testy.\n\n<b>Dlaczego to ważne?</b> Nawiązywanie połączenia z bazą (lub stawianie kontenera Docker) może trwać np. sekundę. Jeśli masz 1000 testów, ze <code>scope=\&#34;function\&#34;</code> zajęłoby to 1000 sekund (ponad 15 minut!). Ze <code>scope=\&#34;session\&#34;</code> trwa to sekundę, a testy śmigają błyskawicznie.</pre>&#34;},{&#34;cat&#34;:&#34;pojecie&#34;,&#34;catLabel&#34;:&#34;💡 Pojęcie&#34;,&#34;q&#34;:&#34;Dlaczego w dobrych projektach dzieli się testy na katalogi: unit/, integration/ i e2e/?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>Dla porządku oraz w celu <b>selektywnego uruchamiania</b> z racji na czas ich trwania.\n\n• <b>unit/</b> (jednostkowe) – są odizolowane, na mockach. Wykonują się w ułamku sekundy. Odpalasz je cały czas podczas pisania kodu (natychmiastowy feedback).\n• <b>integration/ i e2e/</b> – łączą się z prawdziwą bazą, API. Są dużo wolniejsze. Odpalasz je rzadziej, np. przed wysłaniem kodu na GitHuba (commit/push) lub w środowisku CI/CD.</pre>&#34;},{&#34;cat&#34;:&#34;pojecie&#34;,&#34;catLabel&#34;:&#34;💡 Pojęcie&#34;,&#34;q&#34;:&#34;Czym jest plik conftest.py?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>To specjalny plik z <b>globalnymi fixtures</b>. Fixtures umieszczone w nim są widoczne dla wszystkich testów w tym folderze i podfolderach <b>bez konieczności ich importowania</b>.\n\n<b>Złote zasady conftest.py:</b>\n1. <b>Nazwa:</b> Pytest wymaga DOKŁADNIE tej nazwy, innej nie rozpozna.\n2. <b>Hurtownia:</b> Służy jako magazyn z \&#34;częściami\&#34; dla testów (np. <code>config</code>, połączenie z bazą).\n3. <b>Scope:</b> Zazwyczaj fixtures w <code>conftest.py</code> mają <code>scope=\&#34;session\&#34;</code>, aby stworzyć np. połączenie z bazą tylko raz na całe testowanie i współdzielić je między plikami.</pre>&#34;},{&#34;cat&#34;:&#34;pojecie&#34;,&#34;catLabel&#34;:&#34;💡 Pojęcie&#34;,&#34;q&#34;:&#34;Po co tworzy się bazowe klasy testowe (np. BaseUnitTestCase)?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>Służą one jako <b>\&#34;gotowe stanowisko pracy\&#34;</b> dla testów konkretnego typu. Żeby zachować zasadę <b>DRY</b>, setup tworzysz raz w klasie bazowej.\n\n<b>Jak to działa?</b>\n1. Klasa bazowa poprzez fixture w nazwie metody <code>autouse_fixtures</code> pobiera części z <code>conftest.py</code>.\n2. \&#34;Podpina\&#34; te części do siebie (używając <code>self.mocker = mocker</code>, <code>self.config = config</code>).\n3. Klasy testujące (np. testujące serwisy) <b>dziedziczą</b> po klasie bazowej i mają od razu gotowe narzędzia pod <code>self</code>, bez proszenia o nie w każdym teście.</pre>&#34;},{&#34;cat&#34;:&#34;kod&#34;,&#34;catLabel&#34;:&#34;💻 Kod&#34;,&#34;q&#34;:&#34;Co robi parametr autouse=True w dekoratorze @pytest.fixture?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>Sprawia, że fixture jest <b>wywoływany automatycznie</b> przed każdym testem (bez konieczności wpisywania jego nazwy w argumentach testu).</pre>&#34;},{&#34;cat&#34;:&#34;pojecie&#34;,&#34;catLabel&#34;:&#34;💡 Pojęcie&#34;,&#34;q&#34;:&#34;Czym jest obiekt Bootstrap tworzony często w conftest.py?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>To klasa (wzorzec Composition Root), która działa jako <b>fabryka aplikacji</b>. Inicjalizuje wszystkie połączenia, klienty S3, AI, repozytoria i składa z nich gotową aplikację.\n\n<b>Analogia:</b> Wyobraź sobie Głównego Kierownika Budowy. Zanim aplikacja (albo test) ruszy, Bootstrap czyta konfigurację i zwołuje wszystkie ekipy: podłącza bazę, ustawia serwisy i API. Dzięki temu cała wiedza o tym \&#34;z jakich klocków składa się aplikacja\&#34; jest w jednym scentralizowanym miejscu.</pre>&#34;},{&#34;cat&#34;:&#34;pojecie&#34;,&#34;catLabel&#34;:&#34;💡 Pojęcie&#34;,&#34;q&#34;:&#34;Dlaczego wyciągamy obiekty z Bootstrapa jako pojedyncze fixtures w conftest.py (np. db_client, ml_service)?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>Żeby testy nie musiały prosić o całą fabrykę (Bootstrap) do której mają dostęp. Robimy im \&#34;skróty\&#34;, żeby prosiły tylko o to narzędzie (np. <code>db_client</code>), którego rzeczywiście potrzebują.\n\nJest to zastosowanie wzorca <b>Wstrzykiwania Zależności (Dependency Injection)</b>. Test dostaje dokładnie ten klocek, którego mu brakuje do pracy, a nie cały worek z narzędziami, z którego musiałby sam go wyciągać (np. pisząc <code>bootstrap.db_client</code> w każdym teście).</pre>&#34;},{&#34;cat&#34;:&#34;pojecie&#34;,&#34;catLabel&#34;:&#34;💡 Pojęcie&#34;,&#34;q&#34;:&#34;Zazwyczaj test integracyjny ma plik helpera (często factory.py / DbFactory). Po co się to robi?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>Aby zautomatyzować operacje na prawdziwej bazie danych i nie powtarzać tego samego kodu SQL w każdym teście.\n\nWiększość testów integracyjnych i E2E potrzebuje konkretnych danych startowych. Zamiast pisać zapytania SQL w teście, wywołujemy np. <code>factory.create_user()</code>.\n\n<b>Główne role Factory:</b>\n1. <b>Tworzenie danych (Setup):</b> Generuje fałszywych użytkowników, oferty pracy, płatności itp.\n2. <b>Sprzątanie (Teardown):</b> Posiada metody np. <code>.clear()</code>, które usuwają dane z tabel po testach, żeby testy nie \&#34;brudziły\&#34; sobie nawzajem środowiska.\n3. <b>Unikalność:</b> Korzysta z bibliotek typu <b>Faker</b> (np. <code>faker.email()</code>), aby każdy wygenerowany obiekt miał unikalne dane, co zapobiega konfliktom w bazie.</pre>&#34;},{&#34;cat&#34;:&#34;pojecie&#34;,&#34;catLabel&#34;:&#34;💡 Pojęcie&#34;,&#34;q&#34;:&#34;Czym charakteryzują się testy w katalogu llm/ i dlaczego trzyma się je osobno?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>Są to testy sztucznej inteligencji. Oddziela się je z trzech powodów:\n1. <b>Koszty:</b> Wywołują prawdziwe API (np. OpenAI), więc każdy test to realne centy z portfela.\n2. <b>Czas:</b> Czekanie na odpowiedź modelu trwa długo.\n3. <b>Niedeterminizm:</b> Modele LLM czasem odpowiadają inaczej na to samo pytanie, przez co testy mogą bywać \&#34;kruche\&#34; (flaky).\n\nDlatego trzyma się je osobno i uruchamia świadomie, tylko wtedy, gdy modyfikujemy np. prompty czy logikę AI.</pre>&#34;}]"> <div class="card" id="card"> <div class="card-face card-front" id="cardFront"> <div class="category" id="cardCategory"></div> <div class="card-label">PYTANIE</div> <div class="card-question" id="cardQuestion"></div> <div class="card-hint pulse">↩ kliknij aby odkryć odpowiedź</div> </div> <div class="card-face card-back" id="cardBack"> <div class="category" id="cardCategoryBack"></div> <div class="card-label">ODPOWIEDŹ</div> <div class="answer-sep"></div> <div class="card-answer" id="cardAnswer"></div> <div class="card-next-hint" id="cardNextHint">↓ Przewiń w razie potrzeby · Przyciski na dole ekranu</div> </div> </div> </div> <div class="controls-wrap" id="controlsWrap"> <div class="btn-row" id="btnRow" style="display:none"> <button type="button" class="btn btn-bad" data-rate="bad">✗ Nie wiedziałem</button> <button type="button" class="btn btn-ok" data-rate="ok">~ Prawie</button> <button type="button" class="btn btn-good" data-rate="good">✓ Wiedziałem</button> </div> <div class="btn-nav" id="btnNav"> <button type="button" class="btn-secondary" id="btnPrev">← Poprzednia</button> <button type="button" class="btn-secondary" id="btnShuffle">⇄ Tasuj</button> <button type="button" class="btn-secondary" id="btnNext">Następna →</button> </div> </div> <div class="stats"> <div class="stat-box"> <div class="stat-num" id="statGood" style="color:var(--green)">0</div> <div class="stat-label">Wiedziałem</div> </div> <div class="stat-box"> <div class="stat-num" id="statOk" style="color:var(--yellow)">0</div> <div class="stat-label">Prawie</div> </div> <div class="stat-box"> <div class="stat-num" id="statBad" style="color:var(--red)">0</div> <div class="stat-label">Nie wiedziałem</div> </div> </div> <div class="finish-screen" id="finishScreen"> <div class="finish-emoji">🎯</div> <div class="finish-title">Sesja zakończona!</div> <div class="finish-stats" id="finishStats"></div> <button type="button" class="btn-secondary" id="btnRestartAll" style="margin-top:1rem">↺ Zacznij od nowa</button> <button type="button" class="btn-secondary" id="btnRestartBad">↺ Powtórz błędne</button> </div> <script>
    const cardWrap = document.getElementById('cardWrap');
    const cards = JSON.parse(cardWrap?.dataset.cards || '[]');
    let currentCards = [...cards];
    let currentIndex = 0;
    let isFlipped = false;
    let scores = { good: 0, ok: 0, bad: 0 };
    let rated = new Set();
    let ratedScores = {};

    const catClass = (cat) => ({ pojecie: 'cat-pojecie', kod: 'cat-kod', analogia: 'cat-analogia', naming: 'cat-naming' }[cat] || 'cat-pojecie');

    function render() {
      const card = currentCards[currentIndex];
      if (!card) return;
      const catCls = catClass(card.cat);
      document.getElementById('cardCategory').className = `category ${catCls}`;
      document.getElementById('cardCategory').textContent = card.catLabel;
      document.getElementById('cardCategoryBack').className = `category ${catCls}`;
      document.getElementById('cardCategoryBack').textContent = card.catLabel;
      document.getElementById('cardQuestion').textContent = card.q;
      document.getElementById('cardAnswer').innerHTML = card.a;
      document.getElementById('progressLabel').textContent = `${currentIndex + 1} / ${currentCards.length}`;
      document.getElementById('progressFill').style.width = `${((currentIndex + 1) / currentCards.length) * 100}%`;
      isFlipped = false;
      document.getElementById('card').classList.remove('flipped');
      document.getElementById('btnRow').style.display = 'none';
      document.getElementById('statGood').textContent = scores.good;
      document.getElementById('statOk').textContent = scores.ok;
      document.getElementById('statBad').textContent = scores.bad;
    }

    function flipCard() {
      if (isFlipped) return;
      isFlipped = true;
      document.getElementById('card').classList.add('flipped');
      document.getElementById('btnRow').style.display = 'grid';
    }

    function rate(score) {
      const cardIndex = cards.indexOf(currentCards[currentIndex]);
      if (!rated.has(currentIndex)) {
        scores[score]++;
        rated.add(currentIndex);
        ratedScores[cardIndex] = score;
      }
      nextCard();
    }

    function nextCard() {
      if (currentIndex < currentCards.length - 1) {
        currentIndex++;
        render();
      } else {
        showFinish();
      }
    }

    function prevCard() {
      if (currentIndex > 0) {
        currentIndex--;
        render();
      }
    }

    function shuffleCards() {
      for (let i = currentCards.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [currentCards[i], currentCards[j]] = [currentCards[j], currentCards[i]];
      }
      currentIndex = 0;
      rated.clear();
      render();
    }

    function showFinish() {
      document.getElementById('cardWrap').classList.add('hidden');
      document.getElementById('controlsWrap').classList.add('hidden');
      document.getElementById('progressWrap').classList.add('hidden');
      document.querySelector('.stats').classList.add('hidden');
      const pct = Math.round((scores.good / currentCards.length) * 100);
      document.getElementById('finishStats').innerHTML = `
        <div class="stat-box"><div class="stat-num" style="color:var(--green)">${scores.good}</div><div class="stat-label">Wiedziałem</div></div>
        <div class="stat-box"><div class="stat-num" style="color:var(--yellow)">${scores.ok}</div><div class="stat-label">Prawie</div></div>
        <div class="stat-box"><div class="stat-num" style="color:var(--red)">${scores.bad}</div><div class="stat-label">Nie wiedziałem</div></div>
        <div class="stat-box"><div class="stat-num" style="color:var(--accent)">${pct}%</div><div class="stat-label">Wynik</div></div>
      `;
      document.getElementById('finishScreen').classList.add('visible');
      if (scores.bad === 0) document.getElementById('btnRestartBad').style.display = 'none';
    }

    function restartAll() {
      currentCards = [...cards];
      currentIndex = 0;
      scores = { good: 0, ok: 0, bad: 0 };
      rated.clear();
      ratedScores = {};
      document.getElementById('cardWrap').classList.remove('hidden');
      document.getElementById('controlsWrap').classList.remove('hidden');
      document.getElementById('progressWrap').classList.remove('hidden');
      document.querySelector('.stats').classList.remove('hidden');
      document.getElementById('finishScreen').classList.remove('visible');
      document.getElementById('btnRestartBad').style.display = '';
      render();
    }

    function restartBad() {
      const badIndices = Object.keys(ratedScores).filter(k => ratedScores[k] === 'bad').map(Number);
      if (badIndices.length === 0) return;
      currentCards = badIndices.map(i => cards[i]);
      currentIndex = 0;
      scores = { good: 0, ok: 0, bad: 0 };
      rated.clear();
      document.getElementById('cardWrap').classList.remove('hidden');
      document.getElementById('controlsWrap').classList.remove('hidden');
      document.getElementById('progressWrap').classList.remove('hidden');
      document.querySelector('.stats').classList.remove('hidden');
      document.getElementById('finishScreen').classList.remove('visible');
      document.getElementById('btnRestartBad').style.display = badIndices.length > 0 ? '' : 'none';
      render();
    }

    cardWrap?.addEventListener('click', flipCard);
    document.querySelectorAll('[data-rate]').forEach(btn => btn.addEventListener('click', () => rate(btn.dataset.rate)));
    document.getElementById('btnPrev')?.addEventListener('click', prevCard);
    document.getElementById('btnNext')?.addEventListener('click', nextCard);
    document.getElementById('btnShuffle')?.addEventListener('click', shuffleCards);
    document.getElementById('btnRestartAll')?.addEventListener('click', restartAll);
    document.getElementById('btnRestartBad')?.addEventListener('click', restartBad);

    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space') { e.preventDefault(); flipCard(); }
      if (e.code === 'ArrowRight') nextCard();
      if (e.code === 'ArrowLeft') prevCard();
      if (e.code === 'Digit1') rate('bad');
      if (e.code === 'Digit2') rate('ok');
      if (e.code === 'Digit3') rate('good');
    });

    render();
  </script>  </main> <script type="module">
      import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
      mermaid.initialize({ 
        startOnLoad: true, 
        theme: 'dark',
        fontFamily: 'Syne, sans-serif'
      });
      
      // Astro renderuje kod mermaid jako zwykłe bloki <pre class="language-mermaid"><code>...
      // Musimy je znaleźć i przekształcić na divy z klasą mermaid, żeby skrypt je wyrenderował
      document.addEventListener('DOMContentLoaded', () => {
        const mermaidBlocks = document.querySelectorAll('pre.astro-code.mermaid, pre.language-mermaid');
        
        mermaidBlocks.forEach(block => {
          const code = block.textContent;
          const div = document.createElement('div');
          div.className = 'mermaid';
          div.textContent = code;
          block.parentNode.replaceChild(div, block);
        });
        
        mermaid.init(undefined, document.querySelectorAll('.mermaid'));
      });
    </script> </body> </html>
