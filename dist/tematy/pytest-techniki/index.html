← Wróć do kategorii
</a> </div> <div id="progressWrap" class="progress-wrap"> <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div> <div class="progress-label" id="progressLabel">1 / 8</div> </div> <div class="card-wrap" id="cardWrap" data-cards="[{&#34;cat&#34;:&#34;pojecie&#34;,&#34;catLabel&#34;:&#34;💡 Pojęcie&#34;,&#34;q&#34;:&#34;Co to jest @pytest.mark.parametrize i po co go używamy?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>Dekorator pozwalający uruchomić <b>ten sam test z wieloma zestawami danych</b> – bez kopiowania kodu.\n\nZamiast pisać 5 identycznych funkcji testowych różniących się tylko wartościami, piszesz jedną funkcję i podajesz tabelkę z przypadkami. Pytest uruchamia ją osobno dla każdego wiersza.\n\n<b>Zasada:</b> Wiersze = przypadki testowe, kolumny = argumenty funkcji.</pre>&#34;},{&#34;cat&#34;:&#34;kod&#34;,&#34;catLabel&#34;:&#34;💻 Kod&#34;,&#34;q&#34;:&#34;Jak wygląda składnia @pytest.mark.parametrize?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;><code>@pytest.mark.parametrize(\&#34;a, b, expected\&#34;, [\n    (1, 2, 3),\n    (0, 0, 0),\n    (-1, 1, 0),\n])\ndef test_add(a, b, expected):\n    assert add(a, b) == expected</code>\n\nPytest uruchomi <code>test_add</code> trzy razy. W raporcie zobaczysz: <code>test_add[1-2-3]</code>, <code>test_add[0-0-0]</code>, <code>test_add[-1-1-0]</code>. Jeśli jeden wiersz obleje, pozostałe i tak się wykonają.</pre>&#34;},{&#34;cat&#34;:&#34;pojecie&#34;,&#34;catLabel&#34;:&#34;💡 Pojęcie&#34;,&#34;q&#34;:&#34;Kiedy szczególnie przydaje się parametrize?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>Gdy chcesz przetestować różne <b>przypadki brzegowe (edge cases)</b> tej samej logiki, np.:\n• Walidacja – dla pustego stringa błąd, dla za długiego błąd, dla poprawnego OK.\n• Ten sam endpoint API z różnym body/query params.\n• Obliczenia matematyczne z różnymi wartościami wejściowymi.\n\n<b>Zasada DRY:</b> Zamiast trzech funkcji – jedna sparametryzowana. Zero duplikacji kodu.</pre>&#34;},{&#34;cat&#34;:&#34;pojecie&#34;,&#34;catLabel&#34;:&#34;💡 Pojęcie&#34;,&#34;q&#34;:&#34;Po co jest pytest.raises i kiedy go używamy?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>Służy do testowania, że kod <b>poprawnie rzuca wyjątek</b> w sytuacji błędu.\n\nBez <code>pytest.raises</code>: jeśli funkcja wybucha, pytest pokazuje FAILED i traktuje to jako błąd testu.\nZ <code>pytest.raises</code>: mówimy \&#34;oczekuję, że w tym bloku wyjątek <b>zostanie</b> rzucony\&#34; – i to jest sukces!\n\n<b>Ważna różnica:</b>\n• <code>pytest.raises</code> – sprawdza, czy MÓJ KOD rzuca właściwy wyjątek.\n• <code>side_effect = Exception(...)</code> na mocku – symuluje awarię zewnętrznego systemu.</pre>&#34;},{&#34;cat&#34;:&#34;kod&#34;,&#34;catLabel&#34;:&#34;💻 Kod&#34;,&#34;q&#34;:&#34;Jak wygląda składnia pytest.raises?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;><code>with pytest.raises(ValueError) as exc_info:\n    service.create_resume(user_id=None, resume=patch)\n\nassert str(exc_info.value) == \&#34;user_id nie może być None\&#34;</code>\n\n• Jeśli kod <b>NIE</b> rzuci wyjątku → test FAILED.\n• Jeśli rzuci → test PASSED, a <code>exc_info.value</code> to złapany wyjątek.\n• Możesz sprawdzić: typ (<code>exc_info.type</code>), komunikat (<code>str(exc_info.value)</code>).</pre>&#34;},{&#34;cat&#34;:&#34;pojecie&#34;,&#34;catLabel&#34;:&#34;💡 Pojęcie&#34;,&#34;q&#34;:&#34;Czym jest wzorzec GIVEN / WHEN / THEN?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;><b>Konwencja struktury testu</b> (znana też jako AAA: Arrange-Act-Assert). Wywodzi się z BDD (Behavior-Driven Development).\n\nNie jest to składnia Pythona ani funkcja pytest – to po prostu <b>sposób układania kodu wewnątrz testu</b> za pomocą komentarzy. Jak przepis na zupę:\n• <b># GIVEN</b> – wyciągasz garnki i kroisz marchewkę (setup)\n• <b># WHEN</b> – włączasz palnik i gotujesz (akcja)\n• <b># THEN</b> – próbujesz i oceniasz, czy dobra (asercje)</pre>&#34;},{&#34;cat&#34;:&#34;pojecie&#34;,&#34;catLabel&#34;:&#34;💡 Pojęcie&#34;,&#34;q&#34;:&#34;Jakie są 3 fazy wzorca GIVEN / WHEN / THEN i co w każdej robimy?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>1. <b>GIVEN</b> (Zakładając że...) – przygotowanie stanu świata przed testem: tworzenie mocków, wstawianie danych do bazy, budowanie obiektów. \&#34;Mamy taki a taki stan\&#34;.\n\n2. <b>WHEN</b> (Kiedy...) – wywołanie testowanej funkcji lub endpointu. To jest <b>jedna kluczowa akcja</b>, którą chcemy przetestować.\n\n3. <b>THEN</b> (Wtedy...) – asercje: sprawdzasz wynik (<code>assert result.id == 123</code>) i ewentualnie czy mocki zostały wywołane (<code>assert_called_once</code>).</pre>&#34;},{&#34;cat&#34;:&#34;pojecie&#34;,&#34;catLabel&#34;:&#34;💡 Pojęcie&#34;,&#34;q&#34;:&#34;Po co w ogóle stosować wzorzec GIVEN / WHEN / THEN?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>1. <b>Czytelność:</b> Od razu widać, gdzie jest setup, gdzie akcja, a gdzie weryfikacja. Znika chaos, gdy wywoływanie funkcji przeplata się z deklarowaniem zmiennych.\n\n2. <b>Żywa dokumentacja:</b> Test sam opisuje swoje zachowanie. Każdy, kto wejdzie w kod za pół roku, od razu wie, co jest testowane i jakie są oczekiwania.\n\n3. <b>Łatwiejsze debugowanie:</b> Gdy test wywali, od razu wiesz w której fazie coś poszło nie tak (setup? akcja? asercja?).</pre>&#34;}]"> <div class="card" id="card"> <div class="card-face card-front" id="cardFront"> <div class="category" id="cardCategory"></div> <div class="card-label">PYTANIE</div> <div class="card-question" id="cardQuestion"></div> <div class="card-hint pulse">↩ kliknij aby odkryć odpowiedź</div> </div> <div class="card-face card-back" id="cardBack"> <div class="category" id="cardCategoryBack"></div> <div class="card-label">ODPOWIEDŹ</div> <div class="answer-sep"></div> <div class="card-answer" id="cardAnswer"></div> <div class="card-next-hint" id="cardNextHint">↓ Przewiń w razie potrzeby · Przyciski na dole ekranu</div> </div> </div> </div> <div class="controls-wrap" id="controlsWrap"> <div class="btn-row" id="btnRow" style="display:none"> <button type="button" class="btn btn-bad" data-rate="bad">✗ Nie wiedziałem</button> <button type="button" class="btn btn-ok" data-rate="ok">~ Prawie</button> <button type="button" class="btn btn-good" data-rate="good">✓ Wiedziałem</button> </div> <div class="btn-nav" id="btnNav"> <button type="button" class="btn-secondary" id="btnPrev">← Poprzednia</button> <button type="button" class="btn-secondary" id="btnShuffle">⇄ Tasuj</button> <button type="button" class="btn-secondary" id="btnNext">Następna →</button> </div> </div> <div class="stats"> <div class="stat-box"> <div class="stat-num" id="statGood" style="color:var(--green)">0</div> <div class="stat-label">Wiedziałem</div> </div> <div class="stat-box"> <div class="stat-num" id="statOk" style="color:var(--yellow)">0</div> <div class="stat-label">Prawie</div> </div> <div class="stat-box"> <div class="stat-num" id="statBad" style="color:var(--red)">0</div> <div class="stat-label">Nie wiedziałem</div> </div> </div> <div class="finish-screen" id="finishScreen"> <div class="finish-emoji">🎯</div> <div class="finish-title">Sesja zakończona!</div> <div class="finish-stats" id="finishStats"></div> <button type="button" class="btn-secondary" id="btnRestartAll" style="margin-top:1rem">↺ Zacznij od nowa</button> <button type="button" class="btn-secondary" id="btnRestartBad">↺ Powtórz błędne</button> </div> <script>
    const cardWrap = document.getElementById('cardWrap');
    const cards = JSON.parse(cardWrap?.dataset.cards || '[]');
    let currentCards = [...cards];
    let currentIndex = 0;
    let isFlipped = false;
    let scores = { good: 0, ok: 0, bad: 0 };
    let rated = new Set();
    let ratedScores = {};

    const catClass = (cat) => ({ pojecie: 'cat-pojecie', kod: 'cat-kod', analogia: 'cat-analogia', naming: 'cat-naming' }[cat] || 'cat-pojecie');

    function render() {
      const card = currentCards[currentIndex];
      if (!card) return;
      const catCls = catClass(card.cat);
      document.getElementById('cardCategory').className = `category ${catCls}`;
      document.getElementById('cardCategory').textContent = card.catLabel;
      document.getElementById('cardCategoryBack').className = `category ${catCls}`;
      document.getElementById('cardCategoryBack').textContent = card.catLabel;
      document.getElementById('cardQuestion').textContent = card.q;
      document.getElementById('cardAnswer').innerHTML = card.a;
      document.getElementById('progressLabel').textContent = `${currentIndex + 1} / ${currentCards.length}`;
      document.getElementById('progressFill').style.width = `${((currentIndex + 1) / currentCards.length) * 100}%`;
      isFlipped = false;
      document.getElementById('card').classList.remove('flipped');
      document.getElementById('btnRow').style.display = 'none';
      document.getElementById('statGood').textContent = scores.good;
      document.getElementById('statOk').textContent = scores.ok;
      document.getElementById('statBad').textContent = scores.bad;
    }

    function flipCard() {
      if (isFlipped) return;
      isFlipped = true;
      document.getElementById('card').classList.add('flipped');
      document.getElementById('btnRow').style.display = 'grid';
    }

    function rate(score) {
      const cardIndex = cards.indexOf(currentCards[currentIndex]);
      if (!rated.has(currentIndex)) {
        scores[score]++;
        rated.add(currentIndex);
        ratedScores[cardIndex] = score;
      }
      nextCard();
    }

    function nextCard() {
      if (currentIndex < currentCards.length - 1) {
        currentIndex++;
        render();
      } else {
        showFinish();
      }
    }

    function prevCard() {
      if (currentIndex > 0) {
        currentIndex--;
        render();
      }
    }

    function shuffleCards() {
      for (let i = currentCards.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [currentCards[i], currentCards[j]] = [currentCards[j], currentCards[i]];
      }
      currentIndex = 0;
      rated.clear();
      render();
    }

    function showFinish() {
      document.getElementById('cardWrap').classList.add('hidden');
      document.getElementById('controlsWrap').classList.add('hidden');
      document.getElementById('progressWrap').classList.add('hidden');
      document.querySelector('.stats').classList.add('hidden');
      const pct = Math.round((scores.good / currentCards.length) * 100);
      document.getElementById('finishStats').innerHTML = `
        <div class="stat-box"><div class="stat-num" style="color:var(--green)">${scores.good}</div><div class="stat-label">Wiedziałem</div></div>
        <div class="stat-box"><div class="stat-num" style="color:var(--yellow)">${scores.ok}</div><div class="stat-label">Prawie</div></div>
        <div class="stat-box"><div class="stat-num" style="color:var(--red)">${scores.bad}</div><div class="stat-label">Nie wiedziałem</div></div>
        <div class="stat-box"><div class="stat-num" style="color:var(--accent)">${pct}%</div><div class="stat-label">Wynik</div></div>
      `;
      document.getElementById('finishScreen').classList.add('visible');
      if (scores.bad === 0) document.getElementById('btnRestartBad').style.display = 'none';
    }

    function restartAll() {
      currentCards = [...cards];
      currentIndex = 0;
      scores = { good: 0, ok: 0, bad: 0 };
      rated.clear();
      ratedScores = {};
      document.getElementById('cardWrap').classList.remove('hidden');
      document.getElementById('controlsWrap').classList.remove('hidden');
      document.getElementById('progressWrap').classList.remove('hidden');
      document.querySelector('.stats').classList.remove('hidden');
      document.getElementById('finishScreen').classList.remove('visible');
      document.getElementById('btnRestartBad').style.display = '';
      render();
    }

    function restartBad() {
      const badIndices = Object.keys(ratedScores).filter(k => ratedScores[k] === 'bad').map(Number);
      if (badIndices.length === 0) return;
      currentCards = badIndices.map(i => cards[i]);
      currentIndex = 0;
      scores = { good: 0, ok: 0, bad: 0 };
      rated.clear();
      document.getElementById('cardWrap').classList.remove('hidden');
      document.getElementById('controlsWrap').classList.remove('hidden');
      document.getElementById('progressWrap').classList.remove('hidden');
      document.querySelector('.stats').classList.remove('hidden');
      document.getElementById('finishScreen').classList.remove('visible');
      document.getElementById('btnRestartBad').style.display = badIndices.length > 0 ? '' : 'none';
      render();
    }

    cardWrap?.addEventListener('click', flipCard);
    document.querySelectorAll('[data-rate]').forEach(btn => btn.addEventListener('click', () => rate(btn.dataset.rate)));
    document.getElementById('btnPrev')?.addEventListener('click', prevCard);
    document.getElementById('btnNext')?.addEventListener('click', nextCard);
    document.getElementById('btnShuffle')?.addEventListener('click', shuffleCards);
    document.getElementById('btnRestartAll')?.addEventListener('click', restartAll);
    document.getElementById('btnRestartBad')?.addEventListener('click', restartBad);

    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space') { e.preventDefault(); flipCard(); }
      if (e.code === 'ArrowRight') nextCard();
      if (e.code === 'ArrowLeft') prevCard();
      if (e.code === 'Digit1') rate('bad');
      if (e.code === 'Digit2') rate('ok');
      if (e.code === 'Digit3') rate('good');
    });

    render();
  </script>  </main> <script type="module">
      import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
      mermaid.initialize({ 
        startOnLoad: true, 
        theme: 'dark',
        fontFamily: 'Syne, sans-serif'
      });
      
      // Astro renderuje kod mermaid jako zwykłe bloki <pre class="language-mermaid"><code>...
      // Musimy je znaleźć i przekształcić na divy z klasą mermaid, żeby skrypt je wyrenderował
      document.addEventListener('DOMContentLoaded', () => {
        const mermaidBlocks = document.querySelectorAll('pre.astro-code.mermaid, pre.language-mermaid');
        
        mermaidBlocks.forEach(block => {
          const code = block.textContent;
          const div = document.createElement('div');
          div.className = 'mermaid';
          div.textContent = code;
          block.parentNode.replaceChild(div, block);
        });
        
        mermaid.init(undefined, document.querySelectorAll('.mermaid'));
      });
    </script> </body> </html>
