</a> </div> <div id="progressWrap" class="progress-wrap"> <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div> <div class="progress-label" id="progressLabel">1 / 26</div> </div> <div class="card-wrap" id="cardWrap" data-cards="[{&#34;cat&#34;:&#34;pojecie&#34;,&#34;catLabel&#34;:&#34;💡 Pojęcie&#34;,&#34;q&#34;:&#34;Co to jest Dependency Injection (DI)?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>Dependency Injection to wzorzec projektowy który mówi:\n\&#34;Nie twórz swoich zależności sam — otrzymaj je z zewnątrz.\&#34;\n\nANALOGIA: Pracownik i narzędzia.\n  BEZ DI: Pracownik sam idzie do magazynu, sam wybiera narzędzia, sam je naprawia.\n          Wie gdzie jest magazyn, zna się na narzędziach — ma zbyt dużo wiedzy.\n  Z DI:   Pracownik dostaje narzędzia na początku zmiany od kierownika.\n          Nie wie skąd pochodzą, nie dba o ich serwis — skupia się na pracy.\n\nPRZYKŁAD W KODZIE:\n\n  BEZ DI — Repository sam tworzy DBClient (zła praktyka):\n  class ProductRepository:\n      def __init__(self):\n          self.db = DBClient(config.postgres)  # ← tworzy własną zależność!\n          # Problem 1: nie można podmienić DBClient w testach\n          # Problem 2: każde Repository tworzy własną pulę połączeń\n          # Problem 3: Repository musi znać config — zbyt dużo odpowiedzialności\n\n  Z DI — Repository otrzymuje DBClient z zewnątrz (dobra praktyka):\n  class ProductRepository:\n      def __init__(self, db_client: DBClient):  # ← zależność wstrzyknięta\n          self.db = db_client\n          # Zaleta 1: w testach możesz wstrzyknąć mock zamiast prawdziwego DBClient\n          # Zaleta 2: jedna instancja DBClient dla całej aplikacji\n          # Zaleta 3: Repository nie zna config — ma jedną odpowiedzialność\n\nAle skoro Repository nie tworzy DBClient — kto to robi?\nOdpowiedź: COMPOSITION ROOT, czyli właśnie ten plik — bootstrap.py.</pre>&#34;},{&#34;cat&#34;:&#34;pojecie&#34;,&#34;catLabel&#34;:&#34;💡 Pojęcie&#34;,&#34;q&#34;:&#34;Co to jest Composition Root?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>Composition Root to wzorzec z DI. Dwa słowa kluczowe:\n  \&#34;Composition\&#34; = składanie obiektów\n  \&#34;Root\&#34;        = korzeń — JEDNO miejsce w całej aplikacji\n\nComposition Root to jedyne miejsce w kodzie gdzie wolno pisać:\n  DBClient(config.postgres)\n  ProductRepository(db_client)\n  ProductService(product_repository)\n\nWszędzie indziej — w serwisach, routerach, testach — obiekty są OTRZYMYWANE,\nnie tworzone. To fundamentalna zasada czystej architektury.\n\nPRZEPŁYW ZALEŻNOŚCI (teraz i w przyszłości):\n\n  config (z .env)\n    ↓\n  DBClient(config.postgres)          ← tworzy pulę połączeń z bazą\n    ↓\n  ProductRepository(db_client)       ← dostęp do danych produktów\n    ↓\n  ProductService(product_repository) ← logika biznesowa\n    ↓\n  Router → Depends(get_product_service) ← FastAPI wstrzykuje do endpointów\n\nKażda warstwa zna tylko warstwę poniżej — nie zna szczegółów implementacji.</pre>&#34;},{&#34;cat&#34;:&#34;pojecie&#34;,&#34;catLabel&#34;:&#34;💡 Pojęcie&#34;,&#34;q&#34;:&#34;Co to jest Lazy Init (leniwa inicjalizacja)?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>\&#34;Lazy\&#34; (ang. leniwy) oznacza: nie rób czegoś dopóki naprawdę nie musisz.\nPrzeciwieństwo to \&#34;Eager\&#34; (ang. chciwy/gorliwy): zrób od razu, przy starcie.\n\nANALOGIA Z ŻYCIA — kelner i menu:\n  EAGER (gorliwy kelner): Zanim goście usiądą, kelner drukuje menu dla każdego\n  stolika, nawet jeśli część stolików będzie pustych przez cały wieczór.\n  Marnuje papier i czas na coś co może nie być potrzebne.\n\n  LAZY (leniwy kelner): Kelner drukuje menu dopiero gdy gość usiądzie i poprosi.\n  Jeśli stolik pozostaje pusty — menu nie jest drukowane. Zero marnotrawstwa.\n\nW KODZIE — dwa podejścia do tworzenia DBClient:\n\n  EAGER INIT (zły wybór dla nas):\n  ┌─────────────────────────────────────────────────────────┐\n  │ # Na poziomie modułu — wykona się przy imporcie pliku   │\n  │ _db_client = DBClient(config.postgres)  # ← NATYCHMIAST │\n  └─────────────────────────────────────────────────────────┘\n  Co się dzieje gdy ktoś napisze \&#34;import flyer_api.bootstrap\&#34;?\n  Python ładuje plik → natychmiast wykonuje linię z DBClient()\n  → DBClient próbuje otworzyć ConnectionPool\n  → ConnectionPool próbuje połączyć się z PostgreSQL przez sieć\n  → W testach jednostkowych nie ma PostgreSQL → BŁĄD POŁĄCZENIA\n  → Żaden test nie uruchamia się, bo import już crashuje!\n\n  Przykład błędu który byś zobaczył:\n    ImportError: cannot import name 'bootstrap'\n    caused by: ConnectionRefusedError: [Errno 111] Connection refused\n\n  LAZY INIT (nasz wybór):\n  ┌─────────────────────────────────────────────────────────┐\n  │ _db_client = None  # ← przy imporcie: tylko None        │\n  │                                                         │\n  │ def get_db_client():                                    │\n  │     if _db_client is None:                              │\n  │         _db_client = DBClient(...)  # ← dopiero TUTAJ  │\n  │     return _db_client                                   │\n  └─────────────────────────────────────────────────────────┘\n  Co się dzieje gdy ktoś napisze \&#34;import flyer_api.bootstrap\&#34;?\n  Python ładuje plik → _db_client = None → koniec, nic więcej.\n  Żadnego połączenia z bazą. Import jest tani i bezpieczny.\n\n  DBClient powstaje DOPIERO gdy ktoś wywołuje get_db_client().\n  Testy jednostkowe mockują tę funkcję → nigdy nie wywołują prawdziwego\n  get_db_client() → baza nie jest potrzebna. ✅\n\nKIEDY LAZY INIT MA SENS?\n  → Gdy inicjalizacja jest kosztowna (połączenie sieciowe, odczyt pliku)\n  → Gdy zasób może nie być potrzebny w każdym kontekście (testy, CLI tools)\n  → Gdy chcesz kontrolować KIEDY dokładnie zasób jest tworzony\n\nKIEDY EAGER INIT MA SENS?\n  → Gdy inicjalizacja jest tania (prosty słownik, stała wartość)\n  → Gdy zasób ZAWSZE jest potrzebny i chcesz błąd jak najwcześniej\n  → Gdy czas startu aplikacji nie ma znaczenia</pre>&#34;},{&#34;cat&#34;:&#34;pojecie&#34;,&#34;catLabel&#34;:&#34;💡 Pojęcie&#34;,&#34;q&#34;:&#34;Co to jest Singleton?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>Singleton (ang. jedynak) to wzorzec projektowy który gwarantuje że dana klasa\nma DOKŁADNIE JEDNĄ instancję w całej aplikacji — i że wszyscy używają tej samej.\n\nANALOGIA Z ŻYCIA — ekspres do kawy w biurze:\n  BEZ SINGLETONA: Każdy pracownik kupuje własny ekspres. 50 pracowników =\n  50 ekspresów. Ogromny koszt, zajmują całe biuro, każdy parzy tylko dla siebie.\n\n  Z SINGLETONEM: Jeden ekspres w kuchni. Wszyscy pracownicy korzystają z tego\n  samego. Jeden zakup, jedno miejsce, współdzielony zasób. ✅\n\nW KODZIE — DBClient bez i z Singletonem:\n\n  BEZ SINGLETONA (każde wywołanie tworzy nowy DBClient):\n  ┌─────────────────────────────────────────────────────────────────┐\n  │ def get_db_client():                                            │\n  │     return DBClient(config.postgres)  # ← NOWY obiekt za każdym│\n  └─────────────────────────────────────────────────────────────────┘\n\n  Co się dzieje gdy aplikacja obsługuje 100 żądań HTTP jednocześnie?\n\n  Żądanie  1: get_db_client() → tworzy DBClient → otwiera 2 połączenia z bazą\n  Żądanie  2: get_db_client() → tworzy DBClient → otwiera 2 połączenia z bazą\n  Żądanie  3: get_db_client() → tworzy DBClient → otwiera 2 połączenia z bazą\n  ...\n  Żądanie 50: get_db_client() → tworzy DBClient → otwiera 2 połączenia z bazą\n  SUMA: 100 połączeń otwartych jednocześnie!\n\n  PostgreSQL domyślnie ma limit 100 połączeń (max_connections = 100).\n  Przy 51. żądaniu: \&#34;FATAL: sorry, too many clients already\&#34; → aplikacja pada!\n  Dodatkowo: każde nowe połączenie to handshake TCP + uwierzytelnienie =\n  ~10-50ms opóźnienia przy każdym żądaniu. Aplikacja jest powolna.\n\n  Z SINGLETONEM (nasz kod):\n  ┌─────────────────────────────────────────────────────────────────┐\n  │ _db_client = None                                               │\n  │                                                                 │\n  │ def get_db_client():                                            │\n  │     global _db_client                                           │\n  │     if _db_client is None:          # tylko raz!               │\n  │         _db_client = DBClient(...)  # tworzy JEDNĄ pulę        │\n  │     return _db_client               # zawsze TEN SAM obiekt    │\n  └─────────────────────────────────────────────────────────────────┘\n\n  Co się dzieje gdy aplikacja obsługuje 100 żądań HTTP jednocześnie?\n\n  Żądanie  1: get_db_client() → _db_client is None → tworzy DBClient\n                                 → otwiera pulę: 2-10 połączeń\n  Żądanie  2: get_db_client() → _db_client już istnieje → zwraca TEN SAM\n  Żądanie  3: get_db_client() → _db_client już istnieje → zwraca TEN SAM\n  ...\n  Żądanie 100: get_db_client() → zwraca TEN SAM obiekt\n  SUMA: 2-10 połączeń przez cały czas życia aplikacji. ✅\n\n  Pula zarządza dostępem — jeśli wszystkie połączenia zajęte, żądanie czeka\n  zamiast otwierać nowe. Kontrolowane, przewidywalne, bezpieczne.\n\nLAZY INIT + SINGLETON RAZEM — jak to działa w czasie:\n\n  t=0s  Aplikacja startuje. import bootstrap → _db_client = None. Baza: 0 połączeń.\n  t=1s  Pierwsze żądanie HTTP przychodzi.\n        get_db_client() → _db_client is None → tworzy DBClient\n        Baza: 2 połączenia otwarte (pool_min=2).\n  t=2s  Drugie żądanie HTTP.\n        get_db_client() → _db_client już istnieje → zwraca ten sam obiekt.\n        Baza: nadal 2 połączenia (może 3-4 jeśli duże obciążenie).\n  t=∞   Każde kolejne żądanie: zwraca ten sam DBClient.\n        Baza: 2-10 połączeń (zależnie od obciążenia, nigdy więcej niż max).\n  Aplikacja zamknięta → ConnectionPool zamknięty → 0 połączeń.</pre>&#34;},{&#34;cat&#34;:&#34;pojecie&#34;,&#34;catLabel&#34;:&#34;💡 Pojęcie&#34;,&#34;q&#34;:&#34;Co to jest Thread Safety i Race Condition?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>CO TO JEST WĄTEK (THREAD)?\n\n  Wyobraź sobie restaurację:\n\n  JEDEN KELNER (program jednowątkowy):\n  Kelner obsługuje gości PO KOLEI — najpierw stolik 1, potem stolik 2,\n  potem stolik 3. Nigdy dwa stoliki jednocześnie. Prosto i przewidywalnie,\n  ale przy dużym ruchu — kolejka rośnie i goście czekają.\n\n  WIELU KELNERÓW (program wielowątkowy):\n  Czterech kelnerów chodzi po sali JEDNOCZEŚNIE. Każdy obsługuje inny\n  stolik w tym samym czasie. Szybciej przy dużym ruchu, ale pojawia się\n  nowy problem — co jeśli dwóch kelnerów sięgnie po tę samą rzecz naraz?\n\n  W FastAPI każde żądanie HTTP może być obsługiwane przez osobny wątek.\n  Gdy 100 użytkowników odpytuje API jednocześnie — może działać 100 wątków.\n\nCO TO JEST RACE CONDITION (WYŚCIG WĄTKÓW)?\n\n  Ta sama restauracja. Jedna księga rezerwacji przy wejściu (= nasza zmienna\n  _db_client). Dwóch kelnerów podchodzi do niej JEDNOCZEŚNIE:\n\n  Kelner A czyta:    stolik 5 = wolny\n  Kelner B czyta:    stolik 5 = wolny   ← czyta zanim A zdążył zapisać!\n  Kelner A zapisuje: stolik 5 = zajęty (pan Kowalski)\n  Kelner B zapisuje: stolik 5 = zajęty (pani Nowak)  ← nadpisuje A!\n\n  Efekt: dwóch gości ma rezerwację na ten sam stolik. Chaos.\n  To właśnie race condition — dwa wątki \&#34;ścigają się\&#34; o ten sam zasób.\n\nJAK TO WYGLĄDA W NASZYM KODZIE?\n\n  if _db_client is None:           # KROK 1: sprawdź\n      _db_client = DBClient(...)   # KROK 2: utwórz i zapisz\n  return _db_client                # KROK 3: zwróć\n\n  Między krokiem 1 a krokiem 2 jest ułamek sekundy przerwy.\n  W programie wielowątkowym:\n\n  Wątek A (żądanie od Jana):  sprawdza → _db_client is None → True\n                                         ← system przełącza na wątek B!\n  Wątek B (żądanie od Anny):  sprawdza → _db_client is None → True\n                                         (też True! A jeszcze nie zapisał)\n  Wątek B: tworzy DBClient #1, zapisuje do _db_client\n  Wątek A: tworzy DBClient #2, nadpisuje _db_client  ← gubi #1!\n\n  Efekt: powstają dwie instancje DBClient, obie otwierają pule połączeń.\n  Jedna jest od razu porzucona i nigdy nie zamknięta — wyciek zasobów.</pre>&#34;},{&#34;cat&#34;:&#34;analogia&#34;,&#34;catLabel&#34;:&#34;🍽️ Analogia&#34;,&#34;q&#34;:&#34;Jaka analogia tłumaczy Dependency Injection?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>ANALOGIA: Pracownik i narzędzia.\n  BEZ DI: Pracownik sam idzie do magazynu, sam wybiera narzędzia, sam je naprawia.\n          Wie gdzie jest magazyn, zna się na narzędziach — ma zbyt dużo wiedzy.\n  Z DI:   Pracownik dostaje narzędzia na początku zmiany od kierownika.\n          Nie wie skąd pochodzą, nie dba o ich serwis — skupia się na pracy.\n\nKierownik = bootstrap.py — on tworzy i rozdaje narzędzia (zależności).</pre>&#34;},{&#34;cat&#34;:&#34;analogia&#34;,&#34;catLabel&#34;:&#34;🍽️ Analogia&#34;,&#34;q&#34;:&#34;Jaka analogia tłumaczy Singleton?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>ANALOGIA Z ŻYCIA — ekspres do kawy w biurze:\n  BEZ SINGLETONA: Każdy pracownik kupuje własny ekspres. 50 pracowników =\n  50 ekspresów. Ogromny koszt, zajmują całe biuro, każdy parzy tylko dla siebie.\n\n  Z SINGLETONEM: Jeden ekspres w kuchni. Wszyscy pracownicy korzystają z tego\n  samego. Jeden zakup, jedno miejsce, współdzielony zasób. ✅\n\nW kodzie: jeden DBClient = jedna pula połączeń dla całej aplikacji.</pre>&#34;},{&#34;cat&#34;:&#34;analogia&#34;,&#34;catLabel&#34;:&#34;🍽️ Analogia&#34;,&#34;q&#34;:&#34;Jaka analogia tłumaczy Lazy Init?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>ANALOGIA Z ŻYCIA — kelner i menu:\n  EAGER (gorliwy kelner): Zanim goście usiądą, kelner drukuje menu dla każdego\n  stolika, nawet jeśli część stolików będzie pustych przez cały wieczór.\n  Marnuje papier i czas na coś co może nie być potrzebne.\n\n  LAZY (leniwy kelner): Kelner drukuje menu dopiero gdy gość usiądzie i poprosi.\n  Jeśli stolik pozostaje pusty — menu nie jest drukowane. Zero marnotrawstwa.\n\nW kodzie: EAGER = DBClient przy imporcie. LAZY = DBClient dopiero przy get_db_client().</pre>&#34;},{&#34;cat&#34;:&#34;analogia&#34;,&#34;catLabel&#34;:&#34;🍽️ Analogia&#34;,&#34;q&#34;:&#34;Jaka analogia tłumaczy Race Condition?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>Ta sama restauracja. Jedna księga rezerwacji przy wejściu (= nasza zmienna\n_db_client). Dwóch kelnerów podchodzi do niej JEDNOCZEŚNIE:\n\nKelner A czyta:    stolik 5 = wolny\nKelner B czyta:    stolik 5 = wolny   ← czyta zanim A zdążył zapisać!\nKelner A zapisuje: stolik 5 = zajęty (pan Kowalski)\nKelner B zapisuje: stolik 5 = zajęty (pani Nowak)  ← nadpisuje A!\n\nEfekt: dwóch gości ma rezerwację na ten sam stolik. Chaos.\nTo właśnie race condition — dwa wątki \&#34;ścigają się\&#34; o ten sam zasób.</pre>&#34;},{&#34;cat&#34;:&#34;naming&#34;,&#34;catLabel&#34;:&#34;🔤 Nazewnictwo&#34;,&#34;q&#34;:&#34;Co oznacza podkreślnik _ na początku nazwy zmiennej lub funkcji w Pythonie?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>W Pythonie nie ma prawdziwych modyfikatorów dostępu jak w Javie:\n  Java:   private DBClient dbClient;   ← kompilator BLOKUJE dostęp z zewnątrz\n  Python: _db_client = None            ← konwencja, Python NIE blokuje\n\nPojedynczy podkreślnik _ na początku nazwy to UMOWA MIĘDZY PROGRAMISTAMI:\n\&#34;To jest szczegół implementacyjny tego modułu — nie używaj mnie bezpośrednio.\&#34;\n\nCZY PYTHON TO WYMUSZA?\n  Nie. Technicznie możesz napisać:\n    from flyer_api.bootstrap import _db_client   ← zadziała bez błędu\n  Ale jest JEDEN wyjątek gdzie _ ma techniczne znaczenie:\n    from flyer_api.bootstrap import *            ← import z gwiazdką\n    # _db_client NIE zostanie zaimportowany — Python pomija nazwy z _\n    # get_db_client() zostanie zaimportowany  — bo nie ma _\n\nCAŁA HIERARCHIA KONWENCJI NAZEWNICTWA W PYTHONIE:\n\n  nazwa        → publiczne — używaj swobodnie z zewnątrz\n                 Przykład: get_db_client, config, DBClient\n\n  _nazwa       → \&#34;prywatne\&#34; modułu lub klasy — konwencja, nie wymuszenie\n                 Przykład: _db_client (nasz przypadek)\n                 Znaczenie: szczegół implementacyjny, może się zmienić\n\n  __nazwa      → \&#34;bardzo prywatne\&#34; klasy — Python stosuje name mangling\n                 Przykład: self.__password w klasie User\n                 Python zmienia nazwę na _User__password — utrudnia dostęp\n                 z zewnątrz i z klas dziedziczących. Jedyny przypadek gdzie\n                 Python aktywnie \&#34;ukrywa\&#34; (choć nadal można ominąć).\n\n  __nazwa__    → magiczne metody Pythona — NIGDY nie twórz własnych!\n                 Przykład: __init__, __str__, __len__, __enter__, __exit__\n                 To protokół Pythona — używany przez interpreter.\n\nZŁOTA ZASADA:\n  Podkreślnik to umowa, nie zamek. Komunikuje:\n  \&#34;Jeśli używasz tego bezpośrednio, sam sobie jesteś winien gdy coś\n   się posypie po zmianie implementacji.\&#34;\n  Publiczne API (bez _) jest stabilne — możesz na nim polegać.\n  Prywatne szczegóły (z _) mogą się zmienić bez ostrzeżenia.</pre>&#34;},{&#34;cat&#34;:&#34;naming&#34;,&#34;catLabel&#34;:&#34;🔤 Nazewnictwo&#34;,&#34;q&#34;:&#34;Jaki jest JEDYNY techniczny efekt _ na początku nazwy w Pythonie?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>Przy imporcie z gwiazdką nazwy z _ są pomijane:\n\n  from flyer_api.bootstrap import *            ← import z gwiazdką\n  # _db_client NIE zostanie zaimportowany — Python pomija nazwy z _\n  # get_db_client() zostanie zaimportowany  — bo nie ma _\n\nPoza tym _ to czysto konwencja komunikacyjna — żadnego innego efektu technicznego.</pre>&#34;},{&#34;cat&#34;:&#34;naming&#34;,&#34;catLabel&#34;:&#34;🔤 Nazewnictwo&#34;,&#34;q&#34;:&#34;Co by się stało gdyby _db_client nazywało się db_client (bez _)?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>DLACZEGO _ jest tu ważne — konkretny przykład zagrożenia:\n\n  Gdyby zmienna nazywała się db_client (bez podkreślnika), ktoś mógłby:\n\n  # W jakimś pliku w projekcie:\n  from flyer_api.bootstrap import db_client   ← importuje zmienną bezpośrednio\n  db_client.query(...)                         ← PROBLEM: przy imporcie db_client=None!\n\n  Dlaczego None? Bo Lazy Init — DBClient jest tworzony dopiero przy pierwszym\n  wywołaniu get_db_client(), a nie przy imporcie modułu.\n  Importując zmienną bezpośrednio dostałbyś None, nie DBClient.\n  Błąd: AttributeError: 'NoneType' object has no attribute 'query'\n\n  Gorszy scenariusz — ktoś przypadkowo nadpisuje singleton:\n  from flyer_api.bootstrap import db_client\n  db_client = DBClient(config.postgres)   ← tworzy NOWY DBClient, ale...\n  # ...zmienia tylko LOKALNĄ referencję, nie modułową!\n  # Myśli że podmienił singleton, a tak naprawdę nic nie zmienił.\n  # Trudny do wykrycia bug.\n\n  _ komunikuje: \&#34;używaj get_db_client(), nie tej zmiennej bezpośrednio\&#34;.</pre>&#34;},{&#34;cat&#34;:&#34;kod&#34;,&#34;catLabel&#34;:&#34;💻 Kod&#34;,&#34;q&#34;:&#34;Dlaczego używamy słowa kluczowego `global` w get_db_client()?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>Python ma zasadę: jeśli w funkcji PRZYPISUJESZ do zmiennej (zmienna = coś),\nto Python traktuje ją jako LOKALNĄ, chyba że jawnie powiesz \&#34;global\&#34;.\n\nBEZ global — ZŁY kod:\n  def get_db_client():\n      if _db_client is None:           # Python widzi ODCZYT zmiennej\n          _db_client = DBClient(...)   # Python widzi PRZYPISANIE\n                                       # → traktuje _db_client jako LOKALNĄ!\n      return _db_client\n  # Efekt: za pierwszym razem _db_client lokalna = None → tworzymy DBClient\n  #        ale zapisujemy do LOKALNEJ zmiennej, która znika po wyjściu z funkcji\n  #        przy kolejnym wywołaniu: modułowa _db_client nadal None → tworzymy znowu!\n  #        Singleton nie działa. Tworzymy nowy DBClient przy każdym wywołaniu.\n\nZ global — DOBRY kod (nasz):\n  def get_db_client():\n      global _db_client              # \&#34;mówię o zmiennej modułowej\&#34;\n      if _db_client is None:\n          _db_client = DBClient(...) # zapisuje do MODUŁOWEJ zmiennej ✅\n      return _db_client              # zwraca modułową ✅\n\nWAŻNE — global to antywzorzec w ogólnym kodzie produkcyjnym:\n  - Utrudnia testowanie (stan globalny trudno izolować między testami)\n  - Nie jest thread-safe (patrz uwaga poniżej)\n  - Ukrywa zależności (funkcja korzysta z ukrytego stanu)\n\nW tym konkretnym przypadku global jest AKCEPTOWALNE bo:\n  - Singleton to celowy wzorzec, nie przypadkowy stan globalny\n  - FastAPI i większość frameworków webowych używa podobnego wzorca\n  - Alternatywa (klasa Bootstrap) byłaby over-engineeringiem na tym etapie\n  - W testach jednostkowych mockujemy całą funkcję get_db_client()\n    zamiast dotykać _db_client bezpośrednio</pre>&#34;},{&#34;cat&#34;:&#34;kod&#34;,&#34;catLabel&#34;:&#34;💻 Kod&#34;,&#34;q&#34;:&#34;Dlaczego Lazy Init jest kluczowy dla testów jednostkowych?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>EAGER INIT (zły wybór dla nas):\n  # Na poziomie modułu — wykona się przy imporcie pliku\n  _db_client = DBClient(config.postgres)  # ← NATYCHMIAST\n\n  Co się dzieje gdy ktoś napisze \&#34;import flyer_api.bootstrap\&#34;?\n  Python ładuje plik → natychmiast wykonuje linię z DBClient()\n  → DBClient próbuje otworzyć ConnectionPool\n  → ConnectionPool próbuje połączyć się z PostgreSQL przez sieć\n  → W testach jednostkowych nie ma PostgreSQL → BŁĄD POŁĄCZENIA\n  → Żaden test nie uruchamia się, bo import już crashuje!\n\n  Przykład błędu który byś zobaczył:\n    ImportError: cannot import name 'bootstrap'\n    caused by: ConnectionRefusedError: [Errno 111] Connection refused\n\nLAZY INIT (nasz wybór):\n  _db_client = None  # ← przy imporcie: tylko None\n\n  def get_db_client():\n      if _db_client is None:\n          _db_client = DBClient(...)  # ← dopiero TUTAJ\n      return _db_client\n\n  Co się dzieje gdy ktoś napisze \&#34;import flyer_api.bootstrap\&#34;?\n  Python ładuje plik → _db_client = None → koniec, nic więcej.\n  Żadnego połączenia z bazą. Import jest tani i bezpieczny.\n\n  DBClient powstaje DOPIERO gdy ktoś wywołuje get_db_client().\n  Testy jednostkowe mockują tę funkcję → nigdy nie wywołują prawdziwego\n  get_db_client() → baza nie jest potrzebna. ✅</pre>&#34;},{&#34;cat&#34;:&#34;kod&#34;,&#34;catLabel&#34;:&#34;💻 Kod&#34;,&#34;q&#34;:&#34;Jak wygląda thread-safe wersja get_db_client() z double-checked locking?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>Gdybyś używał Celery workers lub prawdziwego multithreadingu,\nużyj wzorca \&#34;double-checked locking\&#34; z threading.Lock():\n\n  import threading\n\n  _db_client: DBClient | None = None\n  _lock = threading.Lock()\n  # Lock to \&#34;zamek\&#34; — tylko jeden wątek może go \&#34;wziąć\&#34; w danym momencie.\n  # Inny wątek który chce wziąć zajęty lock — CZEKA aż zostanie zwolniony.\n\n  def get_db_client() -> DBClient:\n      global _db_client\n      if _db_client is None:           # 1. sprawdzenie BEZ locka (szybkie)\n          with _lock:                  # bierze zamek — inne wątki czekają\n              if _db_client is None:   # 2. sprawdzenie Z lockiem (bezpieczne)\n                  _db_client = DBClient(config.postgres)\n      return _db_client\n\nDLACZEGO dwa sprawdzenia is None?\nPierwsze (bez locka) — żeby przy każdym normalnym wywołaniu (gdy DBClient\njuż istnieje) nie blokować lockiem. Lock jest \&#34;drogi\&#34; — spowalnia każde\nwywołanie. Gdy _db_client już istnieje, omijamy lock całkowicie.\n\nDrugie (z lockiem) — żeby wątek B który czekał na lock nie tworzył\nDBClient ponownie gdy wątek A już to zrobił podczas czekania wątku B.\n\nScenariusz z lockiem:\nWątek A: sprawdza (bez locka) → None → bierze lock → sprawdza znowu → None\n         → tworzy DBClient → zwalnia lock\nWątek B: sprawdza (bez locka) → None → czeka na lock → bierze lock\n         → sprawdza znowu → JUŻ NIE None! → pomija tworzenie → zwalnia lock\nEfekt: tylko jedna instancja DBClient. Thread-safe. ✅\n\nKIEDY UŻYWAĆ KTÓREJ WERSJI?\n  FastAPI (async)     │ Bez locka ✅ OK\n  Skrypty, CLI        │ Bez locka ✅ OK\n  Celery workers      │ Z lockiem ✅ Zalecane\n  threading.Thread    │ Z lockiem ✅ Zalecane</pre>&#34;},{&#34;cat&#34;:&#34;kod&#34;,&#34;catLabel&#34;:&#34;💻 Kod&#34;,&#34;q&#34;:&#34;Jak wygląda przepływ zależności w bootstrap.py (teraz i w przyszłości)?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>PRZEPŁYW ZALEŻNOŚCI (teraz i w przyszłości):\n\n  config (z .env)\n    ↓\n  DBClient(config.postgres)          ← tworzy pulę połączeń z bazą\n    ↓\n  ProductRepository(db_client)       ← dostęp do danych produktów\n    ↓\n  ProductService(product_repository) ← logika biznesowa\n    ↓\n  Router → Depends(get_product_service) ← FastAPI wstrzykuje do endpointów\n\nKażda warstwa zna tylko warstwę poniżej — nie zna szczegółów implementacji.\n\nKażda nowa warstwa dostaje własną funkcję get_*:\n  def get_product_repository() -> ProductRepository:\n      return ProductRepository(get_db_client())\n  def get_product_service() -> ProductService:\n      return ProductService(get_product_repository())\n\nFastAPI Router użyje:\n  @router.get(\&#34;/products\&#34;)\n  async def list_products(service: ProductService = Depends(get_product_service)):\n      return await service.list_all()\n\nZauważ że żaden Router, żaden Serwis, żaden Repository nie tworzy\nwłasnych zależności — wszystko pochodzi z bootstrap.\nTo jest właśnie \&#34;Composition Root\&#34; — jeden korzeń, z którego wyrastają\nwszystkie zależności aplikacji.</pre>&#34;},{&#34;cat&#34;:&#34;kod&#34;,&#34;catLabel&#34;:&#34;💻 Kod&#34;,&#34;q&#34;:&#34;Dlaczego importujemy klasę DBClient a nie instancję?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>DBClient — klasa zarządzająca pulą połączeń z PostgreSQL.\nImportujemy z adapters/db/__init__.py który eksportuje DBClient —\ndzięki temu piszemy krócej:\n  from flyer_api.adapters.db import DBClient         ← używamy tego\n  from flyer_api.adapters.db.client import DBClient  ← też działa, ale dłużej\n\nImportujemy KLASĘ (nie instancję!) — instancję tworzymy w get_db_client().\nGdybyśmy tworzyli instancję tutaj (na poziomie modułu), łamalibyśmy\nzasadę Lazy Init opisaną w nagłówku.</pre>&#34;},{&#34;cat&#34;:&#34;kod&#34;,&#34;catLabel&#34;:&#34;💻 Kod&#34;,&#34;q&#34;:&#34;Kiedy wywołać db_client.close() i jak to zrobić w FastAPI?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>DBClient ma metodę close() która zamyka pulę połączeń. Kiedy ją wywołać?\n\nPrzy normalnym działaniu aplikacji — NIGDY w trakcie obsługi żądań.\nPula ma żyć przez cały czas działania aplikacji.\n\nZamykanie jest potrzebne przy SHUTDOWN — gdy aplikacja się wyłącza.\nW FastAPI (gdy będzie) użyj lifespan:\n\n  from contextlib import asynccontextmanager\n\n  @asynccontextmanager\n  async def lifespan(app: FastAPI):\n      yield  # aplikacja działa\n      get_db_client().close()  # przy shutdown — zamknij pulę\n\n  app = FastAPI(lifespan=lifespan)\n\nW skryptach CLI: na końcu main() lub w bloku try/finally.\nBez close() Python zwolni zasoby przy wyjściu z procesu, ale jawny close()\njest czystszy — ConnectionPool dostaje sygnał do graceful shutdown.</pre>&#34;},{&#34;cat&#34;:&#34;pojecie&#34;,&#34;catLabel&#34;:&#34;💡 Pojęcie&#34;,&#34;q&#34;:&#34;Kiedy Race Condition jest akceptowalne w FastAPI i dlaczego?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>DLACZEGO MIMO TO JEST AKCEPTOWALNE W FASTAPI?\n\n  Powód 1 — GIL (Global Interpreter Lock):\n  Python ma specjalny mechanizm który sprawia że w danej chwili tylko\n  JEDEN wątek może wykonywać kod Pythona. Wątki przełączają się bardzo\n  szybko ale nie są naprawdę równoległe jak w Javie czy C++.\n  UWAGA: GIL zwalnia się przy operacjach I/O (np. połączenie z bazą) —\n  wtedy race condition jest bardziej prawdopodobny niż przy \&#34;czystym\&#34; CPU.\n  Mimo to dla FastAPI jest akceptowalne (patrz powody 2 i 3 poniżej).\n\n  Powód 2 — moment startu:\n  get_db_client() jest wywoływane przy pierwszym żądaniu gdy aplikacja\n  dopiero startuje. W tym momencie zwykle działa jeszcze jeden wątek.\n\n  Powód 3 — skutki są niegroźne:\n  Nawet jeśli race condition wystąpi i powstaną dwie instancje DBClient —\n  obie działają poprawnie. To tylko chwilowe marnotrawstwo jednego\n  ConnectionPool. Aplikacja nie pada, dane się nie psują.\n\n  Podsumowanie dla FastAPI — obecny kod bez locka jest AKCEPTOWALNY\n  i STANDARDOWY. Nie komplikuj go przedwcześnie.</pre>&#34;},{&#34;cat&#34;:&#34;pojecie&#34;,&#34;catLabel&#34;:&#34;💡 Pojęcie&#34;,&#34;q&#34;:&#34;Czym różni się `global` od antywzorca i kiedy jest akceptowalne?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>WAŻNE — global to antywzorzec w ogólnym kodzie produkcyjnym:\n  - Utrudnia testowanie (stan globalny trudno izolować między testami)\n  - Nie jest thread-safe (patrz uwaga poniżej)\n  - Ukrywa zależności (funkcja korzysta z ukrytego stanu)\n\nW tym konkretnym przypadku global jest AKCEPTOWALNE bo:\n  - Singleton to celowy wzorzec, nie przypadkowy stan globalny\n  - FastAPI i większość frameworków webowych używa podobnego wzorca\n  - Alternatywa (klasa Bootstrap) byłaby over-engineeringiem na tym etapie\n  - W testach jednostkowych mockujemy całą funkcję get_db_client()\n    zamiast dotykać _db_client bezpośrednio</pre>&#34;},{&#34;cat&#34;:&#34;naming&#34;,&#34;catLabel&#34;:&#34;🔤 Nazewnictwo&#34;,&#34;q&#34;:&#34;Jaka jest różnica między `_nazwa`, `__nazwa` i `__nazwa__` w Pythonie?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>CAŁA HIERARCHIA KONWENCJI NAZEWNICTWA W PYTHONIE:\n\n  nazwa        → publiczne — używaj swobodnie z zewnątrz\n                 Przykład: get_db_client, config, DBClient\n\n  _nazwa       → \&#34;prywatne\&#34; modułu lub klasy — konwencja, nie wymuszenie\n                 Przykład: _db_client (nasz przypadek)\n                 Znaczenie: szczegół implementacyjny, może się zmienić\n\n  __nazwa      → \&#34;bardzo prywatne\&#34; klasy — Python stosuje name mangling\n                 Przykład: self.__password w klasie User\n                 Python zmienia nazwę na _User__password — utrudnia dostęp\n                 z zewnątrz i z klas dziedziczących. Jedyny przypadek gdzie\n                 Python aktywnie \&#34;ukrywa\&#34; (choć nadal można ominąć).\n\n  __nazwa__    → magiczne metody Pythona — NIGDY nie twórz własnych!\n                 Przykład: __init__, __str__, __len__, __enter__, __exit__\n                 To protokół Pythona — używany przez interpreter.\n\nZŁOTA ZASADA:\n  Podkreślnik to umowa, nie zamek. Komunikuje:\n  \&#34;Jeśli używasz tego bezpośrednio, sam sobie jesteś winien gdy coś\n   się posypie po zmianie implementacji.\&#34;\n  Publiczne API (bez _) jest stabilne — możesz na nim polegać.\n  Prywatne szczegóły (z _) mogą się zmienić bez ostrzeżenia.</pre>&#34;},{&#34;cat&#34;:&#34;pojecie&#34;,&#34;catLabel&#34;:&#34;💡 Pojęcie&#34;,&#34;q&#34;:&#34;Co to jest Composition Root i dlaczego bootstrap.py jest tym miejscem?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>Composition Root to jedyne miejsce w aplikacji, gdzie tworzymy i składamy\nzależności (DBClient, Repository, serwisy itd.) — nie jeden obiekt, lecz całą\n\&#34;grafię\&#34; zależności. Bootstrap.py jest tym miejscem — jedno miejsce w całej\naplikacji, gdzie wolno pisać DBClient(config.postgres) i podobne.\nWszędzie indziej obiekty są OTRZYMYWANE, nie tworzone.</pre>&#34;},{&#34;cat&#34;:&#34;pojecie&#34;,&#34;catLabel&#34;:&#34;💡 Pojęcie&#34;,&#34;q&#34;:&#34;Dlaczego w get_db_client() używamy lazy init zamiast tworzyć DBClient przy imporcie modułu?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>Bo przy imporcie modułu uruchamiane są testy jednostkowe (np. test_config),\nktóre NIE MAJĄ bazy danych. Gdyby DBClient tworzył się przy imporcie,\nod razu byłoby połączenie do PostgreSQL — testy padłyby (Connection refused).\nLazy init = DBClient powstaje dopiero przy PIERWSZYM WYWOŁANIU get_db_client(),\nnie przy imporcie. Testy jednostkowe mockują tę funkcję → baza nie jest potrzebna.</pre>&#34;},{&#34;cat&#34;:&#34;pojecie&#34;,&#34;catLabel&#34;:&#34;💡 Pojęcie&#34;,&#34;q&#34;:&#34;Czym różni się singleton w bootstrap od zwykłego tworzenia obiektu w funkcji?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>Singleton: obiekt tworzy się TYLKO RAZ i jest wykorzystywany w całej aplikacji.\nBez singletona: każde wywołanie get_db_client() tworzyłoby NOWY DBClient\ni nową pulę połączeń → wiele pul, wyczerpanie limitu połączeń, wolna aplikacja.\nZ singletonem: jedna pula połączeń, współdzielona przez wszystkie żądania.</pre>&#34;},{&#34;cat&#34;:&#34;pojecie&#34;,&#34;catLabel&#34;:&#34;💡 Pojęcie&#34;,&#34;q&#34;:&#34;Jak FastAPI będzie używać get_db_client() w endpointach? (podaj wzorzec)&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>Wzorzec: Depends(get_db_client) — wstrzyknięcie zależności (DI).\n\n@router.get(\&#34;/products\&#34;)\ndef list_products(db_client: DBClient = Depends(get_db_client)):\n    ...\n\nFastAPI wywołuje get_db_client() i przekazuje wynik do endpointu.\nTo klasyczny wzorzec DI w FastAPI.</pre>&#34;},{&#34;cat&#34;:&#34;pojecie&#34;,&#34;catLabel&#34;:&#34;💡 Pojęcie&#34;,&#34;q&#34;:&#34;Dlaczego fixture db_client w conftest jest opcjonalna na tym etapie, a w imprv jest obowiązkowa?&#34;,&#34;a&#34;:&#34;<pre style=\&#34;white-space:pre-wrap;font-family:inherit;margin:0;background:transparent;border:none;padding:0;font-size:0.95rem;line-height:1.6;\&#34;>Fixture db_client ma sens TYLKO przy testach integracyjnych, które łączą się z bazą.\nNa tym etapie mamy tylko testy jednostkowe (test_config) — nie potrzebują DBClient.\nW imprv fixture jest obowiązkowa, bo imprv MA testy integracyjne Repository,\nktóre używają db_client. Dodamy fixture przy KROK 15 (pierwszy test integracyjny).</pre>&#34;}]"> <div class="card" id="card"> <div class="card-face card-front" id="cardFront"> <div class="category" id="cardCategory"></div> <div class="card-label">PYTANIE</div> <div class="card-question" id="cardQuestion"></div> <div class="card-hint pulse">↩ kliknij aby odkryć odpowiedź</div> </div> <div class="card-face card-back" id="cardBack"> <div class="category" id="cardCategoryBack"></div> <div class="card-label">ODPOWIEDŹ</div> <div class="answer-sep"></div> <div class="card-answer" id="cardAnswer"></div> <div class="card-next-hint" id="cardNextHint">↓ Przewiń w razie potrzeby · Przyciski na dole ekranu</div> </div> </div> </div> <div class="controls-wrap" id="controlsWrap"> <div class="btn-row" id="btnRow" style="display:none"> <button type="button" class="btn btn-bad" data-rate="bad">✗ Nie wiedziałem</button> <button type="button" class="btn btn-ok" data-rate="ok">~ Prawie</button> <button type="button" class="btn btn-good" data-rate="good">✓ Wiedziałem</button> </div> <div class="btn-nav" id="btnNav"> <button type="button" class="btn-secondary" id="btnPrev">← Poprzednia</button> <button type="button" class="btn-secondary" id="btnShuffle">⇄ Tasuj</button> <button type="button" class="btn-secondary" id="btnNext">Następna →</button> </div> </div> <div class="stats"> <div class="stat-box"> <div class="stat-num" id="statGood" style="color:var(--green)">0</div> <div class="stat-label">Wiedziałem</div> </div> <div class="stat-box"> <div class="stat-num" id="statOk" style="color:var(--yellow)">0</div> <div class="stat-label">Prawie</div> </div> <div class="stat-box"> <div class="stat-num" id="statBad" style="color:var(--red)">0</div> <div class="stat-label">Nie wiedziałem</div> </div> </div> <div class="finish-screen" id="finishScreen"> <div class="finish-emoji">🎯</div> <div class="finish-title">Sesja zakończona!</div> <div class="finish-stats" id="finishStats"></div> <button type="button" class="btn-secondary" id="btnRestartAll" style="margin-top:1rem">↺ Zacznij od nowa</button> <button type="button" class="btn-secondary" id="btnRestartBad">↺ Powtórz błędne</button> </div> <script>
    const cardWrap = document.getElementById('cardWrap');
    const cards = JSON.parse(cardWrap?.dataset.cards || '[]');
    let currentCards = [...cards];
    let currentIndex = 0;
    let isFlipped = false;
    let scores = { good: 0, ok: 0, bad: 0 };
    let rated = new Set();
    let ratedScores = {};

    const catClass = (cat) => ({ pojecie: 'cat-pojecie', kod: 'cat-kod', analogia: 'cat-analogia', naming: 'cat-naming' }[cat] || 'cat-pojecie');

    function render() {
      const card = currentCards[currentIndex];
      if (!card) return;
      const catCls = catClass(card.cat);
      document.getElementById('cardCategory').className = `category ${catCls}`;
      document.getElementById('cardCategory').textContent = card.catLabel;
      document.getElementById('cardCategoryBack').className = `category ${catCls}`;
      document.getElementById('cardCategoryBack').textContent = card.catLabel;
      document.getElementById('cardQuestion').textContent = card.q;
      document.getElementById('cardAnswer').innerHTML = card.a;
      document.getElementById('progressLabel').textContent = `${currentIndex + 1} / ${currentCards.length}`;
      document.getElementById('progressFill').style.width = `${((currentIndex + 1) / currentCards.length) * 100}%`;
      isFlipped = false;
      document.getElementById('card').classList.remove('flipped');
      document.getElementById('btnRow').style.display = 'none';
      document.getElementById('statGood').textContent = scores.good;
      document.getElementById('statOk').textContent = scores.ok;
      document.getElementById('statBad').textContent = scores.bad;
    }

    function flipCard() {
      if (isFlipped) return;
      isFlipped = true;
      document.getElementById('card').classList.add('flipped');
      document.getElementById('btnRow').style.display = 'grid';
    }

    function rate(score) {
      const cardIndex = cards.indexOf(currentCards[currentIndex]);
      if (!rated.has(currentIndex)) {
        scores[score]++;
        rated.add(currentIndex);
        ratedScores[cardIndex] = score;
      }
      nextCard();
    }

    function nextCard() {
      if (currentIndex < currentCards.length - 1) {
        currentIndex++;
        render();
      } else {
        showFinish();
      }
    }

    function prevCard() {
      if (currentIndex > 0) {
        currentIndex--;
        render();
      }
    }

    function shuffleCards() {
      for (let i = currentCards.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [currentCards[i], currentCards[j]] = [currentCards[j], currentCards[i]];
      }
      currentIndex = 0;
      rated.clear();
      render();
    }

    function showFinish() {
      document.getElementById('cardWrap').classList.add('hidden');
      document.getElementById('controlsWrap').classList.add('hidden');
      document.getElementById('progressWrap').classList.add('hidden');
      document.querySelector('.stats').classList.add('hidden');
      const pct = Math.round((scores.good / currentCards.length) * 100);
      document.getElementById('finishStats').innerHTML = `
        <div class="stat-box"><div class="stat-num" style="color:var(--green)">${scores.good}</div><div class="stat-label">Wiedziałem</div></div>
        <div class="stat-box"><div class="stat-num" style="color:var(--yellow)">${scores.ok}</div><div class="stat-label">Prawie</div></div>
        <div class="stat-box"><div class="stat-num" style="color:var(--red)">${scores.bad}</div><div class="stat-label">Nie wiedziałem</div></div>
        <div class="stat-box"><div class="stat-num" style="color:var(--accent)">${pct}%</div><div class="stat-label">Wynik</div></div>
      `;
      document.getElementById('finishScreen').classList.add('visible');
      if (scores.bad === 0) document.getElementById('btnRestartBad').style.display = 'none';
    }

    function restartAll() {
      currentCards = [...cards];
      currentIndex = 0;
      scores = { good: 0, ok: 0, bad: 0 };
      rated.clear();
      ratedScores = {};
      document.getElementById('cardWrap').classList.remove('hidden');
      document.getElementById('controlsWrap').classList.remove('hidden');
      document.getElementById('progressWrap').classList.remove('hidden');
      document.querySelector('.stats').classList.remove('hidden');
      document.getElementById('finishScreen').classList.remove('visible');
      document.getElementById('btnRestartBad').style.display = '';
      render();
    }

    function restartBad() {
      const badIndices = Object.keys(ratedScores).filter(k => ratedScores[k] === 'bad').map(Number);
      if (badIndices.length === 0) return;
      currentCards = badIndices.map(i => cards[i]);
      currentIndex = 0;
      scores = { good: 0, ok: 0, bad: 0 };
      rated.clear();
      document.getElementById('cardWrap').classList.remove('hidden');
      document.getElementById('controlsWrap').classList.remove('hidden');
      document.getElementById('progressWrap').classList.remove('hidden');
      document.querySelector('.stats').classList.remove('hidden');
      document.getElementById('finishScreen').classList.remove('visible');
      document.getElementById('btnRestartBad').style.display = badIndices.length > 0 ? '' : 'none';
      render();
    }

    cardWrap?.addEventListener('click', flipCard);
    document.querySelectorAll('[data-rate]').forEach(btn => btn.addEventListener('click', () => rate(btn.dataset.rate)));
    document.getElementById('btnPrev')?.addEventListener('click', prevCard);
    document.getElementById('btnNext')?.addEventListener('click', nextCard);
    document.getElementById('btnShuffle')?.addEventListener('click', shuffleCards);
    document.getElementById('btnRestartAll')?.addEventListener('click', restartAll);
    document.getElementById('btnRestartBad')?.addEventListener('click', restartBad);

    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space') { e.preventDefault(); flipCard(); }
      if (e.code === 'ArrowRight') nextCard();
      if (e.code === 'ArrowLeft') prevCard();
      if (e.code === 'Digit1') rate('bad');
      if (e.code === 'Digit2') rate('ok');
      if (e.code === 'Digit3') rate('good');
    });

    render();
  </script>  </main> <script type="module">
      import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
      mermaid.initialize({

      // Astro renderuje kod mermaid jako zwykłe bloki <pre class="language-mermaid"><code>...
      // Musimy je znaleźć i przekształcić na divy z klasą mermaid, żeby skrypt je wyrenderował

        const mermaidBlocks = document.querySelectorAll('pre.astro-code.mermaid, pre.language-mermaid');
        
        mermaidBlocks.forEach(block => {
          const code = block.textContent;
          const div = document.createElement('div');
          div.className = 'mermaid';
          div.textContent = code;
          block.parentNode.replaceChild(div, block);
        });
        
        mermaid.init(undefined, document.querySelectorAll('.mermaid'));
      });
    </script> </body> </html>
